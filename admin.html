<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200, initial-scale=1">
<title>서베이런 - 관리자</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic","Segoe UI",sans-serif;background:#f4ebd9;color:#2a1f10;min-height:100vh}
  button{cursor:pointer;font-family:inherit}
  input,select,textarea{font-family:inherit;font-size:14px}
  a{color:#7d5a3c}
  header{background:linear-gradient(135deg,#7d5a3c,#a06d3c);color:#fff;padding:16px 28px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 12px rgba(0,0,0,.1)}
  header h1{font-size:20px;font-weight:800;letter-spacing:.5px}
  header h1 .em{margin-right:8px}
  .top-actions{display:flex;gap:10px;align-items:center;font-size:13px}
  .top-actions button{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);padding:6px 12px;border-radius:8px;font-size:13px}
  .top-actions button:hover{background:rgba(255,255,255,.25)}
  main{padding:24px 28px;max-width:1200px;margin:0 auto}
  .card{background:#fff;border-radius:14px;padding:22px;box-shadow:0 4px 16px rgba(125,90,60,.08);margin-bottom:20px}
  .card h2{font-size:18px;color:#7d5a3c;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
  .btn{padding:9px 16px;border:none;border-radius:8px;font-weight:600;font-size:14px;transition:all .15s}
  .btn-primary{background:linear-gradient(135deg,#d9a06b,#7d5a3c);color:#fff}
  .btn-primary:hover{filter:brightness(1.05)}
  .btn-ghost{background:#f4ebd9;color:#7d5a3c;border:1px solid #d9b88a}
  .btn-ghost:hover{background:#ebd9b6}
  .btn-danger{background:#fef0ef;color:#c0392b;border:1px solid #f5c6c2}
  .btn-danger:hover{background:#fdd9d6}
  .btn-sm{padding:5px 10px;font-size:12px;border-radius:6px}
  table{width:100%;border-collapse:collapse}
  th,td{padding:10px 12px;text-align:left;border-bottom:1px solid #ebd9b6;font-size:13px;vertical-align:middle}
  th{background:#fef6e7;color:#7d5a3c;font-weight:700;font-size:12px;letter-spacing:.3px}
  tbody tr:hover{background:#fffaf0}
  .empty{text-align:center;padding:40px;color:#9a7a5a;font-size:14px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:13px;font-weight:600;color:#5a3a1c;margin-bottom:6px}
  .field input,.field textarea,.field select{width:100%;padding:10px 12px;border:1.5px solid #e0c89a;border-radius:8px;outline:none;background:#fffaf0}
  .field input:focus,.field textarea:focus{border-color:#7d5a3c}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .modal-bg{position:fixed;inset:0;background:rgba(40,28,12,.55);z-index:50;display:none;align-items:center;justify-content:center;padding:20px}
  .modal-bg.show{display:flex}
  .modal{background:#fff;border-radius:14px;padding:26px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;box-shadow:0 16px 60px rgba(0,0,0,.3)}
  .modal h3{font-size:18px;color:#7d5a3c;margin-bottom:16px}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;padding-top:14px;border-top:1px solid #ebd9b6}
  .q-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:8px;padding:8px;background:#fef6e7;border-radius:8px}
  .q-row .q-num{font-weight:700;color:#7d5a3c;min-width:28px;padding-top:8px;text-align:center}
  .q-row textarea{flex:1;min-height:42px;resize:vertical;padding:8px 10px;border:1.5px solid #e0c89a;border-radius:6px;background:#fff}
  .q-row .q-actions{display:flex;flex-direction:column;gap:4px}
  .badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;background:#fef6e7;color:#7d5a3c}
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#fef6e7,#f4ebd9)}
  .login-card{background:#fff;border-radius:18px;padding:36px;width:100%;max-width:380px;box-shadow:0 12px 36px rgba(125,90,60,.18)}
  .login-card h1{font-size:22px;color:#7d5a3c;margin-bottom:8px;text-align:center}
  .login-card p{color:#9a7a5a;font-size:13px;margin-bottom:22px;text-align:center}
  .stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
  .stat-box{background:#fef6e7;border-radius:10px;padding:14px 16px;border-left:4px solid #d9a06b}
  .stat-box .lbl{font-size:11px;color:#9a7a5a;font-weight:600}
  .stat-box .val{font-size:22px;font-weight:800;color:#7d5a3c;margin-top:4px}
  .qr-box{display:flex;gap:24px;align-items:center;background:#fef6e7;padding:18px;border-radius:12px}
  .qr-canvas-wrap{background:#fff;padding:12px;border-radius:10px;border:1px solid #e0c89a}
  .qr-info{flex:1;font-size:13px;color:#5a3a1c;line-height:1.7}
  .qr-info .url-box{background:#fff;padding:8px 10px;border-radius:6px;border:1px solid #e0c89a;font-family:monospace;font-size:12px;word-break:break-all;margin:6px 0}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#2a1f10;color:#fff;padding:10px 18px;border-radius:8px;font-size:14px;z-index:80;opacity:0;transition:opacity .2s;pointer-events:none}
  .toast.show{opacity:1}
  .live-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#2e7d32;margin-right:6px;animation:blink 1.4s infinite}
  @keyframes blink{50%{opacity:.4}}
  .answer-cell{display:flex;flex-direction:column;gap:2px}
  .answer-pill{display:inline-block;padding:2px 6px;border-radius:4px;font-size:11px;color:#fff;font-weight:600}
</style>
</head>
<body>

<!-- 로그인 -->
<div id="login-screen" class="login-wrap">
  <div class="login-card">
    <h1>🏃 서베이런 관리자</h1>
    <p>관리자 비밀번호를 입력하세요</p>
    <div class="field">
      <input id="pw-input" type="password" placeholder="비밀번호" autocomplete="current-password">
    </div>
    <div id="pw-err" style="color:#c0392b;font-size:13px;margin-bottom:8px;display:none">비밀번호가 틀렸습니다.</div>
    <button id="login-btn" class="btn btn-primary" style="width:100%">로그인</button>
  </div>
</div>

<!-- 메인 -->
<div id="app" style="display:none">
  <header>
    <h1>🏃 서베이런 - 관리자</h1>
    <div class="top-actions">
      <span id="net-status" style="font-size:12px"></span>
      <button id="back-btn" style="display:none">← 목록으로</button>
      <button id="logout-btn">로그아웃</button>
    </div>
  </header>

  <main>
    <!-- 프로그램 목록 -->
    <section id="list-view">
      <div class="card">
        <h2>프로그램 목록 <button id="new-prog-btn" class="btn btn-primary">+ 새 프로그램</button></h2>
        <div id="prog-list-container">
          <table id="prog-table">
            <thead>
              <tr>
                <th style="width:110px">일자</th>
                <th>프로그램명</th>
                <th>조사명</th>
                <th style="width:80px;text-align:center">문항</th>
                <th style="width:80px;text-align:center">응답</th>
                <th style="width:200px;text-align:right">작업</th>
              </tr>
            </thead>
            <tbody id="prog-tbody"></tbody>
          </table>
          <div id="prog-empty" class="empty" style="display:none">아직 등록된 프로그램이 없습니다. "+ 새 프로그램"을 눌러 시작하세요.</div>
        </div>
      </div>
    </section>

    <!-- 상세 -->
    <section id="detail-view" style="display:none">
      <div class="card">
        <h2 id="detail-title">
          <span></span>
          <span>
            <button id="edit-prog-btn" class="btn btn-ghost">편집</button>
            <button id="delete-prog-btn" class="btn btn-danger">삭제</button>
          </span>
        </h2>
        <div id="detail-meta" style="font-size:13px;color:#5a3a1c;margin-bottom:16px"></div>

        <div class="qr-box">
          <div class="qr-canvas-wrap">
            <img id="qr-img" width="200" height="200" alt="QR 코드" style="display:block;background:#fff;image-rendering:pixelated">
          </div>
          <div class="qr-info">
            <div><strong>참가자 접속 링크</strong></div>
            <div id="qr-url" class="url-box"></div>
            <div style="display:flex;gap:8px;flex-wrap:wrap">
              <button id="copy-url-btn" class="btn btn-ghost btn-sm">링크 복사</button>
              <button id="download-qr-btn" class="btn btn-ghost btn-sm">QR 이미지 저장</button>
              <button id="open-game-btn" class="btn btn-ghost btn-sm">새 탭에서 열기</button>
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <h2><span><span class="live-dot"></span>실시간 응답 현황</span>
          <span>
            <button id="refresh-btn" class="btn btn-ghost btn-sm">새로고침</button>
            <button id="excel-btn" class="btn btn-primary">📊 엑셀 다운로드</button>
            <button id="delete-resp-btn" class="btn btn-danger btn-sm">전체 응답 삭제</button>
          </span>
        </h2>
        <div class="stat-row">
          <div class="stat-box"><div class="lbl">총 응답</div><div class="val" id="s-total">0</div></div>
          <div class="stat-box"><div class="lbl">평균 시간</div><div class="val" id="s-time">-</div></div>
          <div class="stat-box"><div class="lbl">평균 패널티</div><div class="val" id="s-pen">-</div></div>
          <div class="stat-box"><div class="lbl">전체 평균 만족도</div><div class="val" id="s-avg">-</div></div>
        </div>
        <div id="q-summary" style="margin-bottom:16px"></div>
        <div style="overflow-x:auto">
          <table id="resp-table">
            <thead>
              <tr id="resp-head"></tr>
            </thead>
            <tbody id="resp-tbody"></tbody>
          </table>
          <div id="resp-empty" class="empty" style="display:none">아직 응답이 없습니다.</div>
        </div>
      </div>
    </section>
  </main>
</div>

<!-- 프로그램 편집 모달 -->
<div id="edit-modal" class="modal-bg">
  <div class="modal">
    <h3 id="edit-modal-title">새 프로그램</h3>
    <div class="grid-2">
      <div class="field">
        <label>일자</label>
        <input id="m-date" type="date">
      </div>
      <div class="field">
        <label>조사명</label>
        <input id="m-survey" type="text" placeholder="예: 2026 봄 청소년 동아리 만족도">
      </div>
    </div>
    <div class="field">
      <label>프로그램명</label>
      <input id="m-name" type="text" placeholder="예: 4월 청소년 동아리 한마당">
    </div>
    <div class="field">
      <label>설문 문항 <span style="color:#9a7a5a;font-weight:400">(각 문항당 5점 척도)</span></label>
      <div id="m-questions"></div>
      <button id="m-add-q" class="btn btn-ghost btn-sm" style="margin-top:6px">+ 문항 추가</button>
    </div>
    <div id="m-err" style="color:#c0392b;font-size:13px;margin-top:8px;display:none"></div>
    <div class="modal-actions">
      <button id="m-cancel" class="btn btn-ghost">취소</button>
      <button id="m-save" class="btn btn-primary">저장</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<!-- 외부 라이브러리 -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import {
  getFirestore, collection, doc, getDoc, getDocs, addDoc, setDoc, deleteDoc,
  updateDoc, query, where, orderBy, onSnapshot, serverTimestamp, writeBatch
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBPI8wugVUAOcehqDkYHa-xXFX5vSKgWs4",
  authDomain: "hodoo-survey.firebaseapp.com",
  projectId: "hodoo-survey",
  storageBucket: "hodoo-survey.firebasestorage.app",
  messagingSenderId: "917750738044",
  appId: "1:917750738044:web:b3023dee781b31640d2df9"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ADMIN_PW = "hodoo2026"; // 비밀번호 변경 시 이 줄만 수정
const SLOT_LABELS = ["매우만족","만족","보통","불만족","매우불만족"]; // 슬롯 1~5
const SLOT_COLORS = ["#2e7d32","#7cb342","#fbc02d","#fb8c00","#e53935"];
// 점수 1~5 (반전: 1=매우불만족, 5=매우만족)
const SCORE_LABELS = ["매우불만족","불만족","보통","만족","매우만족"];
const SCORE_COLORS = ["#e53935","#fb8c00","#fbc02d","#7cb342","#2e7d32"];

// 응답 객체에서 점수(1~5, 5=매우만족) 추출 — 신/구 데이터 호환
function ansScore(a){
  if (!a || a.a == null) return null;
  // 신규 데이터: a.slot 필드가 있으면 a.a는 이미 점수
  if (typeof a.slot === 'number') return a.a;
  // 구 데이터: a.a가 슬롯이므로 점수로 변환
  return 6 - a.a;
}
function ansLabel(a){
  if (!a) return "";
  if (a.label) return a.label;
  const s = ansScore(a);
  return s ? SCORE_LABELS[s-1] : "";
}
const GAME_BASE = location.href.replace(/admin\.html.*/, "game.html");

const $ = id => document.getElementById(id);
function toast(msg){ const t=$("toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),1800); }
function escapeHtml(s){return String(s==null?"":s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function fmtTs(ts){
  if (!ts) return "-";
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const p = n => String(n).padStart(2,"0");
  return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate())+" "+p(d.getHours())+":"+p(d.getMinutes());
}

// ===== 로그인 =====
function tryAutoLogin(){
  if (sessionStorage.getItem("hodoo_admin")==="1"){ enterApp(); }
}
function enterApp(){
  $("login-screen").style.display = "none";
  $("app").style.display = "block";
  loadPrograms();
}
$("login-btn").addEventListener("click", () => {
  if ($("pw-input").value === ADMIN_PW){
    sessionStorage.setItem("hodoo_admin","1");
    enterApp();
  } else {
    $("pw-err").style.display = "block";
  }
});
$("pw-input").addEventListener("keydown", e => { if (e.key==="Enter") $("login-btn").click(); });
$("logout-btn").addEventListener("click", () => {
  sessionStorage.removeItem("hodoo_admin");
  location.reload();
});

// ===== 네트워크 표시 =====
function updateNet(){
  $("net-status").textContent = navigator.onLine ? "🟢 온라인" : "🔴 오프라인";
}
window.addEventListener("online", updateNet);
window.addEventListener("offline", updateNet);
updateNet();

// ===== 프로그램 목록 =====
let programsCache = [];

async function loadPrograms(){
  try {
    const snap = await getDocs(query(collection(db,"programs"), orderBy("createdAt","desc")));
    programsCache = snap.docs.map(d => ({id:d.id, ...d.data()}));
    renderPrograms();
  } catch(e){
    console.error(e);
    toast("프로그램 목록 로드 실패: "+e.message);
  }
}

function renderPrograms(){
  const tb = $("prog-tbody");
  tb.innerHTML = "";
  if (!programsCache.length){
    $("prog-table").style.display = "none";
    $("prog-empty").style.display = "block";
    return;
  }
  $("prog-table").style.display = "";
  $("prog-empty").style.display = "none";
  for (const p of programsCache){
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${escapeHtml(p.date||"-")}</td>
      <td><strong>${escapeHtml(p.name||"(제목 없음)")}</strong></td>
      <td>${escapeHtml(p.surveyName||"-")}</td>
      <td style="text-align:center"><span class="badge">${(p.questions||[]).length}개</span></td>
      <td style="text-align:center" data-count="${p.id}">-</td>
      <td style="text-align:right">
        <button class="btn btn-primary btn-sm" data-act="open" data-id="${p.id}">열기</button>
        <button class="btn btn-ghost btn-sm" data-act="edit" data-id="${p.id}">편집</button>
        <button class="btn btn-danger btn-sm" data-act="del" data-id="${p.id}">삭제</button>
      </td>
    `;
    tb.appendChild(tr);
  }
  tb.querySelectorAll("button").forEach(b => {
    b.addEventListener("click", () => handleProgAction(b.dataset.act, b.dataset.id));
  });
  // 응답 수 카운트 (병렬)
  programsCache.forEach(async p => {
    try {
      const snap = await getDocs(query(collection(db,"responses"), where("programId","==",p.id)));
      const cell = document.querySelector(`td[data-count="${p.id}"]`);
      if (cell) cell.innerHTML = `<span class="badge">${snap.size}건</span>`;
    } catch(e){}
  });
}

function handleProgAction(act, id){
  const p = programsCache.find(x=>x.id===id);
  if (!p) return;
  if (act==="open") openDetail(p);
  else if (act==="edit") openEditModal(p);
  else if (act==="del") deleteProgram(p);
}

$("new-prog-btn").addEventListener("click", () => openEditModal(null));

// ===== 편집 모달 =====
let editingProg = null;

function openEditModal(p){
  editingProg = p;
  $("edit-modal-title").textContent = p ? "프로그램 편집" : "새 프로그램";
  $("m-name").value = p ? (p.name||"") : "";
  $("m-date").value = p ? (p.date||"") : new Date().toISOString().slice(0,10);
  $("m-survey").value = p ? (p.surveyName||"") : "";
  const qs = (p && p.questions) ? p.questions.map(q => q.text || q) : ["프로그램에 만족하셨습니까?"];
  renderQuestionRows(qs);
  $("m-err").style.display = "none";
  $("edit-modal").classList.add("show");
}

function renderQuestionRows(qs){
  const c = $("m-questions");
  c.innerHTML = "";
  qs.forEach((q,i) => addQRow(q));
  bindQActions();
}
function addQRow(text=""){
  const c = $("m-questions");
  const idx = c.children.length;
  const div = document.createElement("div");
  div.className = "q-row";
  div.innerHTML = `
    <div class="q-num">${idx+1}</div>
    <textarea class="q-text" placeholder="문항을 입력하세요">${escapeHtml(text)}</textarea>
    <div class="q-actions">
      <button class="btn btn-ghost btn-sm q-up" title="위로">▲</button>
      <button class="btn btn-ghost btn-sm q-dn" title="아래로">▼</button>
      <button class="btn btn-danger btn-sm q-del" title="삭제">×</button>
    </div>
  `;
  c.appendChild(div);
  bindQActions();
}
function bindQActions(){
  const rows = [...$("m-questions").children];
  rows.forEach((r,i) => {
    r.querySelector(".q-num").textContent = i+1;
    r.querySelector(".q-up").onclick = () => { if (i>0){ r.parentNode.insertBefore(r, rows[i-1]); bindQActions(); } };
    r.querySelector(".q-dn").onclick = () => { if (i<rows.length-1){ r.parentNode.insertBefore(rows[i+1], r); bindQActions(); } };
    r.querySelector(".q-del").onclick = () => { if (rows.length>1){ r.remove(); bindQActions(); } else { toast("최소 1개 문항이 필요합니다"); } };
  });
}
$("m-add-q").addEventListener("click", () => addQRow(""));
$("m-cancel").addEventListener("click", () => $("edit-modal").classList.remove("show"));
$("m-save").addEventListener("click", saveProgram);

async function saveProgram(){
  const name = $("m-name").value.trim();
  const date = $("m-date").value;
  const surveyName = $("m-survey").value.trim();
  const qs = [...document.querySelectorAll("#m-questions .q-text")].map(t => t.value.trim()).filter(t=>t).map(t => ({text:t, type:"likert5"}));
  if (!name){ showMErr("프로그램명을 입력해주세요"); return; }
  if (!qs.length){ showMErr("문항을 1개 이상 입력해주세요"); return; }
  const data = { name, date, surveyName, questions: qs, updatedAt: serverTimestamp() };
  try {
    let newId = editingProg ? editingProg.id : null;
    const wasNew = !editingProg;
    if (editingProg){
      await updateDoc(doc(db,"programs",editingProg.id), data);
      toast("저장되었습니다");
    } else {
      data.createdAt = serverTimestamp();
      const ref = await addDoc(collection(db,"programs"), data);
      newId = ref.id;
      toast("새 프로그램이 생성되었습니다");
    }
    $("edit-modal").classList.remove("show");
    await loadPrograms();
    if (wasNew && newId){
      const p = programsCache.find(x => x.id === newId);
      if (p) openDetail(p);
    } else if (currentProg && currentProg.id === newId){
      currentProg = programsCache.find(x => x.id === newId) || currentProg;
      openDetail(currentProg);
    }
  } catch(e){
    showMErr("저장 실패: "+e.message);
  }
}
function showMErr(msg){ $("m-err").textContent = msg; $("m-err").style.display = "block"; }

async function deleteProgram(p){
  if (!confirm(`"${p.name}" 프로그램을 삭제하시겠습니까?\n(기존 응답 데이터는 남아있습니다)`)) return;
  try {
    await deleteDoc(doc(db,"programs",p.id));
    toast("삭제되었습니다");
    await loadPrograms();
  } catch(e){
    toast("삭제 실패: "+e.message);
  }
}

// ===== 상세 =====
let currentProg = null;
let unsubResp = null;
let respCache = [];

function openDetail(p){
  currentProg = p;
  $("list-view").style.display = "none";
  $("detail-view").style.display = "block";
  $("back-btn").style.display = "inline-block";
  $("detail-title").querySelector("span").textContent = p.name;
  $("detail-meta").innerHTML = `
    <span class="badge">${escapeHtml(p.date||"-")}</span>
    ${p.surveyName ? `<span class="badge" style="margin-left:6px">${escapeHtml(p.surveyName)}</span>` : ""}
    <span class="badge" style="margin-left:6px">${(p.questions||[]).length}개 문항</span>
  `;
  // QR 생성
  const url = GAME_BASE + "?p=" + p.id;
  $("qr-url").textContent = url;
  drawQR(url);
  // 응답 구독
  subscribeResponses(p.id);
}

$("back-btn").addEventListener("click", () => {
  $("list-view").style.display = "";
  $("detail-view").style.display = "none";
  $("back-btn").style.display = "none";
  if (unsubResp){ unsubResp(); unsubResp = null; }
  currentProg = null;
  loadPrograms();
});

$("edit-prog-btn").addEventListener("click", () => openEditModal(currentProg));
$("delete-prog-btn").addEventListener("click", async () => {
  if (!currentProg) return;
  await deleteProgram(currentProg);
  $("back-btn").click();
});

$("copy-url-btn").addEventListener("click", () => {
  const url = $("qr-url").textContent;
  navigator.clipboard.writeText(url).then(()=>toast("링크 복사됨"));
});
$("open-game-btn").addEventListener("click", () => {
  window.open($("qr-url").textContent, "_blank");
});
$("download-qr-btn").addEventListener("click", async () => {
  if (!currentProg) return;
  const url = $("qr-url").textContent;
  const apiUrl = "https://api.qrserver.com/v1/create-qr-code/?size=600x600&margin=15&qzone=2&color=3a2814&data=" + encodeURIComponent(url);
  try {
    const r = await fetch(apiUrl);
    if (!r.ok) throw new Error("HTTP " + r.status);
    const blob = await r.blob();
    const dl = document.createElement("a");
    dl.download = "qr_" + (currentProg.name||"program").replace(/[^\w가-힣]+/g,"_") + ".png";
    dl.href = URL.createObjectURL(blob);
    dl.click();
    setTimeout(() => URL.revokeObjectURL(dl.href), 1000);
    toast("QR 이미지 다운로드 완료");
  } catch(e){
    toast("다운로드 실패: " + e.message);
  }
});

function drawQR(url){
  // QR Server API (무료, 무인증) 사용
  const apiUrl = "https://api.qrserver.com/v1/create-qr-code/?size=400x400&margin=10&qzone=2&color=3a2814&data=" + encodeURIComponent(url);
  $("qr-img").src = apiUrl;
  $("qr-img").onerror = () => { toast("QR 이미지를 불러오지 못했습니다 (인터넷 확인)"); };
}

// ===== 응답 구독 =====
function subscribeResponses(pid){
  if (unsubResp){ unsubResp(); unsubResp = null; }
  respCache = [];
  const q = query(collection(db,"responses"), where("programId","==",pid));
  unsubResp = onSnapshot(q, snap => {
    respCache = snap.docs.map(d => ({id:d.id, ...d.data()}));
    respCache.sort((a,b) => (b.clientTs||0) - (a.clientTs||0));
    renderResponses();
  }, err => {
    console.error(err); toast("응답 구독 실패: "+err.message);
  });
}

function renderResponses(){
  const total = respCache.length;
  $("s-total").textContent = total;
  if (!total){
    $("s-time").textContent = "-";
    $("s-pen").textContent = "-";
    $("s-avg").textContent = "-";
    $("resp-empty").style.display = "block";
    $("resp-table").style.display = "none";
    $("q-summary").innerHTML = "";
    return;
  }
  $("resp-empty").style.display = "none";
  $("resp-table").style.display = "";

  const avgT = respCache.reduce((s,r)=>s+(r.timeSec||0),0)/total;
  const avgP = respCache.reduce((s,r)=>s+(r.penaltySec||0),0)/total;
  $("s-time").textContent = avgT.toFixed(1)+"초";
  $("s-pen").textContent = avgP.toFixed(1)+"초";

  // 문항별 평균 (점수: 1=매우불만족, 5=매우만족)
  const qs = currentProg.questions || [];
  const sums = qs.map(()=>({sum:0,n:0,counts:[0,0,0,0,0]}));
  for (const r of respCache){
    (r.answers||[]).forEach((a,i) => {
      if (i < sums.length){
        const s = ansScore(a);
        if (s){
          sums[i].sum += s;
          sums[i].n += 1;
          sums[i].counts[s-1]++;
        }
      }
    });
  }
  const overallAvg = sums.reduce((s,x)=>s+(x.n? x.sum/x.n : 0),0) / (sums.length||1);
  $("s-avg").textContent = overallAvg.toFixed(2)+"점";

  // 문항 요약 (점수 5점이 매우만족이라 위에서 아래로 표시)
  const sumHtml = sums.map((x,i) => {
    const avg = x.n ? (x.sum/x.n).toFixed(2) : "-";
    const text = (qs[i].text||qs[i]||"") + "";
    // 점수 5(매우만족) → 1(매우불만족) 순으로 표시
    const order = [4,3,2,1,0]; // counts 인덱스: score 5,4,3,2,1
    const bars = order.map(k => {
      const c = x.counts[k];
      const pct = x.n ? Math.round(c/x.n*100) : 0;
      return `<div style="display:flex;align-items:center;gap:6px;font-size:11px;margin:2px 0">
        <span style="width:90px;color:${SCORE_COLORS[k]};font-weight:700">${k+1}점·${SCORE_LABELS[k]}</span>
        <div style="flex:1;background:#f4ebd9;height:14px;border-radius:4px;overflow:hidden"><div style="width:${pct}%;height:100%;background:${SCORE_COLORS[k]}"></div></div>
        <span style="width:70px;text-align:right">${c}건 (${pct}%)</span>
      </div>`;
    }).join("");
    return `<div style="background:#fef6e7;border-radius:10px;padding:12px;margin-bottom:8px">
      <div style="font-size:13px;font-weight:700;color:#5a3a1c;margin-bottom:8px">Q${i+1}. ${escapeHtml(text)} <span style="float:right;color:#7d5a3c">평균 ${avg}점 / ${x.n}명</span></div>
      ${bars}
    </div>`;
  }).join("");
  $("q-summary").innerHTML = sumHtml;

  // 응답 테이블 (성별·교급 컬럼 추가)
  const head = $("resp-head");
  head.innerHTML = "<th>응답시각</th><th>닉네임</th><th>성별</th><th>교급</th><th>전화뒷4</th><th>시간</th><th>패널티</th>" +
    qs.map((q,i)=>`<th title="${escapeHtml(q.text||q)}">Q${i+1}</th>`).join("");
  const tb = $("resp-tbody");
  tb.innerHTML = "";
  for (const r of respCache){
    const tr = document.createElement("tr");
    let tds = `
      <td>${fmtTs(r.ts || r.clientTs)}</td>
      <td><strong>${escapeHtml(r.name||"")}</strong></td>
      <td>${escapeHtml(r.gender||"-")}</td>
      <td>${escapeHtml(r.school||"-")}</td>
      <td>${escapeHtml(r.phone||"")}</td>
      <td>${(r.timeSec||0).toFixed(1)}s</td>
      <td>${(r.penaltySec||0).toFixed(1)}s</td>
    `;
    for (let i=0;i<qs.length;i++){
      const a = (r.answers||[])[i];
      const s = ansScore(a);
      if (s){
        tds += `<td><span class="answer-pill" style="background:${SCORE_COLORS[s-1]}">${s}점·${ansLabel(a)}</span></td>`;
      } else {
        tds += `<td>-</td>`;
      }
    }
    tr.innerHTML = tds;
    tb.appendChild(tr);
  }
}

$("refresh-btn").addEventListener("click", () => {
  if (currentProg) subscribeResponses(currentProg.id);
});

// ===== 엑셀 =====
$("excel-btn").addEventListener("click", () => {
  if (!currentProg || !respCache.length){ toast("응답이 없습니다"); return; }
  const qs = currentProg.questions || [];
  const rows = respCache.map(r => {
    const row = {
      "응답시각": fmtTs(r.ts || r.clientTs),
      "조사명": r.surveyName || currentProg.surveyName || "",
      "프로그램명": r.programName || currentProg.name || "",
      "일자": r.date || currentProg.date || "",
      "닉네임": r.name || "",
      "성별": r.gender || "",
      "교급": r.school || "",
      "전화뒷4": r.phone || "",
      "완주시간(초)": r.timeSec || 0,
      "패널티(초)": r.penaltySec || 0
    };
    for (let i=0;i<qs.length;i++){
      const a = (r.answers||[])[i];
      const qt = qs[i].text || qs[i] || ("Q"+(i+1));
      const s = ansScore(a);
      row["Q"+(i+1)+"_점수"] = s ?? "";   // 5=매우만족 ~ 1=매우불만족
      row["Q"+(i+1)+"_답변"] = a ? ansLabel(a) : "";
      row["Q"+(i+1)+"_문항"] = qt;
    }
    return row;
  });
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "응답");
  // 요약 시트 (점수 5=매우만족 기준)
  const sumRows = qs.map((q,i) => {
    const counts = [0,0,0,0,0]; let sum=0, n=0;
    for (const r of respCache){
      const a = (r.answers||[])[i];
      const s = ansScore(a);
      if (s){ counts[s-1]++; sum+=s; n++; }
    }
    return {
      "문항번호": "Q"+(i+1),
      "문항": q.text||q||"",
      "응답수": n,
      "평균": n ? +(sum/n).toFixed(2) : 0,
      "5점·매우만족": counts[4],
      "4점·만족": counts[3],
      "3점·보통": counts[2],
      "2점·불만족": counts[1],
      "1점·매우불만족": counts[0]
    };
  });
  const ws2 = XLSX.utils.json_to_sheet(sumRows);
  XLSX.utils.book_append_sheet(wb, ws2, "요약");
  const fname = `${currentProg.date||""}_${currentProg.name||"hodoo"}_응답.xlsx`.replace(/\s+/g,"_");
  XLSX.writeFile(wb, fname);
});

$("delete-resp-btn").addEventListener("click", async () => {
  if (!currentProg) return;
  if (!confirm("이 프로그램의 모든 응답을 삭제할까요? (되돌릴 수 없습니다)")) return;
  if (!confirm("정말 삭제하시겠습니까? 한 번 더 확인합니다.")) return;
  try {
    const snap = await getDocs(query(collection(db,"responses"), where("programId","==",currentProg.id)));
    const batch = writeBatch(db);
    snap.docs.forEach(d => batch.delete(d.ref));
    await batch.commit();
    toast("응답이 삭제되었습니다");
  } catch(e){
    toast("삭제 실패: "+e.message);
  }
});
