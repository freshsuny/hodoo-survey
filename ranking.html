<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏆 서베이런 순위</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic","Segoe UI",sans-serif;background:linear-gradient(180deg,#fff2d9 0%,#ffd7a3 60%,#e2b478 100%);color:#3a2814}
  body{min-height:100vh;padding:24px 16px 60px}
  .wrap{max-width:760px;margin:0 auto}
  header{text-align:center;margin-bottom:30px}
  header h1{font-size:30px;color:#7d5a3c;letter-spacing:.5px;margin-bottom:6px}
  header .meta{color:#9a7a5a;font-size:14px;line-height:1.6}
  header .meta .badge{display:inline-block;background:#fff;padding:3px 10px;border-radius:8px;margin:2px 4px;font-size:12px;font-weight:700;color:#7d5a3c;border:1px solid #d9b88a}

  /* Podium */
  .podium-wrap{margin:36px 0 30px}
  .podium{display:flex;align-items:flex-end;justify-content:center;gap:10px;max-width:560px;margin:0 auto}
  .medal{flex:1 1 0;min-width:0;text-align:center;border-radius:14px 14px 6px 6px;padding:14px 8px 16px;color:#fff;position:relative;box-shadow:0 6px 18px rgba(0,0,0,.15)}
  .medal .crown{font-size:34px;line-height:1;margin-bottom:4px}
  .medal .pos{font-size:24px;font-weight:900;letter-spacing:1px;line-height:1}
  .medal .name{font-size:15px;font-weight:800;margin:8px 4px 4px;word-break:keep-all;overflow:hidden;text-overflow:ellipsis}
  .medal .char{font-size:11px;font-weight:600;opacity:.85}
  .medal .time{font-size:18px;font-weight:900;font-family:monospace;margin-top:6px}
  .medal .score{font-size:11px;opacity:.85;margin-top:2px}
  .medal-1{background:linear-gradient(180deg,#ffd700,#daa520);height:230px;order:2;border:3px solid #fff2a8}
  .medal-1 .crown{font-size:42px}
  .medal-2{background:linear-gradient(180deg,#cfcfcf,#999);height:190px;order:1}
  .medal-3{background:linear-gradient(180deg,#cd7f32,#8b4513);height:170px;order:3}
  .empty-podium{height:170px;background:rgba(255,255,255,.4);border:2px dashed #c89b6a;border-radius:14px 14px 6px 6px;display:flex;align-items:center;justify-content:center;color:#9a7a5a;font-size:13px;flex:1 1 0}

  /* Top 10 list */
  .topbox{background:#fff;border-radius:14px;padding:20px 18px;box-shadow:0 6px 20px rgba(125,90,60,.12)}
  .topbox h2{font-size:18px;color:#7d5a3c;margin-bottom:12px}
  .row{display:grid;grid-template-columns:42px 1fr auto;align-items:center;gap:10px;padding:10px 8px;border-bottom:1px solid #f0e0c0;font-size:14px}
  .row:last-child{border-bottom:none}
  .row .rank{font-weight:900;color:#7d5a3c;text-align:center;font-family:monospace;font-size:16px}
  .row .info .nm{font-weight:700;color:#3a2814}
  .row .info .sub{font-size:12px;color:#9a7a5a;margin-top:2px}
  .row .time{font-family:monospace;font-weight:700;color:#a06d3c}
  .row.top1 .rank{color:#daa520}
  .row.top2 .rank{color:#888}
  .row.top3 .rank{color:#8b4513}

  .empty{text-align:center;padding:50px 20px;color:#9a7a5a;font-size:14px}
  footer{text-align:center;margin-top:40px;font-size:11px;color:#9a7a5a}
  .refresh-btn{display:inline-block;margin-top:12px;padding:6px 14px;background:#fff;border:1px solid #d9b88a;border-radius:8px;color:#7d5a3c;font-size:12px;font-weight:600;cursor:pointer}
  .refresh-btn:hover{background:#fef6e7}
  .err{background:#fdecea;color:#c0392b;padding:14px;border-radius:10px;margin:20px 0;font-size:13px;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🏆 서베이런 순위</h1>
    <div id="meta" class="meta">불러오는 중...</div>
    <button class="refresh-btn" id="refresh-btn">🔄 새로고침</button>
  </header>
  <div id="content"></div>
  <footer>완주 시간 + 페널티가 가장 적은 순. © 천안시청소년재단</footer>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import { getFirestore, doc, getDoc, getDocs, collection, query, where } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBPI8wugVUAOcehqDkYHa-xXFX5vSKgWs4",
  authDomain: "hodoo-survey.firebaseapp.com",
  projectId: "hodoo-survey",
  storageBucket: "hodoo-survey.firebasestorage.app",
  messagingSenderId: "917750738044",
  appId: "1:917750738044:web:b3023dee781b31640d2df9"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const $ = id => document.getElementById(id);
const params = new URLSearchParams(location.search);
const programId = params.get("p");

function escapeHtml(s){return String(s==null?"":s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function fmtTime(sec){
  const m = Math.floor(sec/60);
  const s = (sec%60);
  return m > 0 ? `${m}:${s.toFixed(1).padStart(4,"0")}` : `${s.toFixed(1)}s`;
}

async function load(){
  if (!programId){
    $("content").innerHTML = '<div class="err">프로그램 ID가 없습니다. URL을 확인해주세요. (예: ranking.html?p=PROGRAMID)</div>';
    $("meta").textContent = "";
    return;
  }
  try {
    const progSnap = await getDoc(doc(db, "programs", programId));
    if (!progSnap.exists()){
      $("content").innerHTML = '<div class="err">프로그램을 찾을 수 없습니다.</div>';
      $("meta").textContent = "";
      return;
    }
    const program = progSnap.data();
    $("meta").innerHTML = `
      <strong style="font-size:18px;color:#3a2814">${escapeHtml(program.name||"")}</strong><br>
      <span class="badge">${escapeHtml(program.date||"-")}</span>
      ${program.surveyName ? `<span class="badge">${escapeHtml(program.surveyName)}</span>` : ""}
      ${program.manager ? `<span class="badge">담당: ${escapeHtml(program.manager)}</span>` : ""}
    `;

    const respSnap = await getDocs(query(collection(db, "responses"), where("programId","==",programId)));
    let entries = respSnap.docs.map(d => {
      const r = d.data();
      const totalSec = (r.timeSec||0) + (r.penaltySec||0);
      return {
        name: r.name || "익명",
        characterName: r.characterName || "",
        timeSec: r.timeSec || 0,
        penaltySec: r.penaltySec || 0,
        totalSec,
        totalScore: r.totalScore != null ? r.totalScore : (r.answers||[]).reduce((s,a)=>s+(a&&a.a!=null? (typeof a.slot==='number'? a.a : (6-a.a)) :0),0)
      };
    });
    // 시간이 가장 적은 순
    entries.sort((a,b) => a.totalSec - b.totalSec);
    const total = entries.length;
    $("meta").innerHTML += `<div style="margin-top:6px"><span class="badge">참가자 ${total}명</span></div>`;

    if (total === 0){
      $("content").innerHTML = '<div class="empty">아직 응답이 없습니다.<br>참가자가 게임을 완주하면 순위가 표시됩니다.</div>';
      return;
    }

    // Podium (top 3)
    const podiumHtml = renderPodium(entries.slice(0,3));
    // Top 10 (4~10)
    const topHtml = renderTop(entries.slice(0, 10));
    $("content").innerHTML = podiumHtml + topHtml;
  } catch(e){
    console.error(e);
    $("content").innerHTML = '<div class="err">로드 실패: ' + escapeHtml(e.message) + '</div>';
  }
}

function renderPodium(top3){
  const empty = '<div class="empty-podium">미정</div>';
  const cell = (e, rank) => {
    if (!e) return empty;
    const cls = "medal medal-" + rank;
    const crown = rank === 1 ? "👑" : rank === 2 ? "🥈" : "🥉";
    return `
      <div class="${cls}">
        <div class="crown">${crown}</div>
        <div class="pos">${rank}등</div>
        <div class="name" title="${escapeHtml(e.name)}">${escapeHtml(e.name)}</div>
        <div class="char">${escapeHtml(e.characterName||"")}</div>
        <div class="time">${fmtTime(e.totalSec)}</div>
        <div class="score">${e.totalScore}점</div>
      </div>`;
  };
  return `
    <div class="podium-wrap">
      <div class="podium">
        ${cell(top3[1], 2)}
        ${cell(top3[0], 1)}
        ${cell(top3[2], 3)}
      </div>
    </div>
  `;
}

function renderTop(top){
  if (top.length === 0) return "";
  const rows = top.map((e, i) => {
    const r = i+1;
    const cls = "row" + (r<=3 ? " top"+r : "");
    const medal = r === 1 ? "🥇" : r === 2 ? "🥈" : r === 3 ? "🥉" : r;
    return `
      <div class="${cls}">
        <div class="rank">${medal}</div>
        <div class="info">
          <div class="nm">${escapeHtml(e.name)} ${e.characterName ? '<span style="color:#9a7a5a;font-size:11px;font-weight:500">· '+escapeHtml(e.characterName)+'</span>' : ''}</div>
          <div class="sub">${e.totalScore}점${e.penaltySec ? ' · 페널티 +'+e.penaltySec.toFixed(1)+'s' : ''}</div>
        </div>
        <div class="time">${fmtTime(e.totalSec)}</div>
      </div>
    `;
  }).join("");
  return `
    <div class="topbox">
      <h2>TOP ${Math.min(top.length, 10)}</h2>
      ${rows}
    </div>
  `;
}

$("refresh-btn").addEventListener("click", load);
load();
</script>
</body>
</html>
