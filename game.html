<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#7d5a3c">
<title>서베이런</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
  html,body{height:100%;overflow:hidden;background:#fbf3dc;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;color:#333;image-rendering:pixelated}
  body{height:100vh;height:100dvh}
  button{border:none;cursor:pointer;font-family:inherit}
  input{font-family:inherit;font-size:16px}
  .screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
  .hidden{display:none!important}

  /* Loading */
  #loading{background:#fbf3dc}
  .spinner{width:50px;height:50px;border:5px solid #d9b88a;border-top-color:#7d5a3c;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:16px}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* Intro */
  #intro{background:linear-gradient(180deg,#fff2d9 0%,#ffe0b8 100%);overflow-y:auto}
  .card{background:#fff;border-radius:18px;padding:24px 22px;width:100%;max-width:380px;box-shadow:0 10px 30px rgba(125,90,60,.18)}
  .title{font-size:26px;font-weight:800;color:#7d5a3c;text-align:center;margin-bottom:6px}
  .subtitle{font-size:14px;color:#9a7a5a;text-align:center;margin-bottom:18px}
  .program-info{background:#fef6e7;border:1px dashed #d9b88a;border-radius:12px;padding:12px;margin-bottom:16px;font-size:14px;color:#7d5a3c;text-align:center}
  .program-info strong{font-size:16px;display:block;margin-bottom:4px}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:13px;font-weight:600;color:#7d5a3c;margin-bottom:6px}
  .field input{width:100%;padding:12px 14px;border:2px solid #e8d4b6;border-radius:10px;font-size:16px;outline:none;background:#fffaf0}
  .field input:focus{border-color:#c89b6a}
  .field label .hint{font-weight:400;font-size:11px;color:#c0392b;margin-left:6px}
  .pill-row{display:flex;flex-wrap:wrap;gap:6px}
  .pill{cursor:pointer}
  .pill input{display:none}
  .pill span{display:inline-block;padding:8px 14px;border:2px solid #e8d4b6;border-radius:20px;background:#fffaf0;font-size:14px;font-weight:600;color:#7d5a3c;transition:all .12s}
  .pill input:checked + span{background:linear-gradient(135deg,#d9a06b,#7d5a3c);color:#fff;border-color:#7d5a3c;box-shadow:0 2px 6px rgba(125,90,60,.25)}
  .char-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .char-card{background:#fffaf0;border:2px solid #e8d4b6;border-radius:10px;padding:10px 4px 8px;text-align:center;cursor:pointer;transition:all .12s;font-family:inherit}
  .char-card canvas{display:block;margin:0 auto 4px;image-rendering:pixelated}
  .char-card .nm{display:block;font-size:11px;font-weight:700;color:#7d5a3c}
  .char-card:hover{border-color:#c89b6a}
  .char-card.selected{background:linear-gradient(135deg,#fff7d0,#ffe2a0);border-color:#d9a040;box-shadow:0 4px 10px rgba(217,160,64,.35);transform:translateY(-2px)}
  .char-card.selected .nm{color:#7a5410}
  .start-btn{width:100%;padding:14px;background:linear-gradient(135deg,#d9a06b,#7d5a3c);color:#fff;font-size:17px;font-weight:700;border-radius:12px;margin-top:8px;box-shadow:0 4px 12px rgba(125,90,60,.3)}
  .start-btn:active{transform:translateY(1px)}
  .help{font-size:12px;color:#9a7a5a;margin-top:14px;line-height:1.5;text-align:center}
  .err{color:#c0392b;font-size:13px;margin-top:6px}
  .net-badge{position:fixed;top:10px;right:10px;font-size:11px;padding:4px 8px;border-radius:8px;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.1);z-index:20}
  .net-badge.online{color:#2e7d32}
  .net-badge.offline{color:#c0392b}

  /* Game */
  #game{background:#fbf3dc;padding:0;display:flex;flex-direction:column;align-items:stretch;justify-content:flex-start;height:100vh;height:100dvh}
  #top-bar{flex:0 0 auto;display:flex;justify-content:space-between;align-items:center;gap:6px;padding:calc(env(safe-area-inset-top,0) + 8px) 12px 8px;background:#fff;border-bottom:3px solid #7d5a3c;font-family:monospace;font-weight:700;color:#5a3a1c;font-size:12px;z-index:5}
  #top-bar .pill-stat{padding:5px 9px;border-radius:6px;background:#fff7e0;border:2px solid #d9b88a;white-space:nowrap}
  #top-bar #score-pill{background:#fff4d0;border-color:#e0b860;color:#7a5410}
  #top-bar #total-score{font-size:14px;color:#c9881d;font-weight:900}
  #canvas-wrap{flex:1 1 auto;position:relative;overflow:hidden;background:#fbf3dc;min-height:200px}
  #canvas{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none;image-rendering:pixelated;image-rendering:crisp-edges}
  #slot-indicator{position:absolute;top:14px;right:12px;background:#fff;padding:6px 12px;font-size:13px;font-weight:800;font-family:-apple-system,BlinkMacSystemFont,sans-serif;z-index:6;pointer-events:none;border:3px solid #000;border-radius:4px;box-shadow:0 2px 6px rgba(0,0,0,.18);transition:color .12s,border-color .12s}
  #tap-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.7);color:#fff;padding:14px 22px;border-radius:0;font-size:15px;font-weight:700;pointer-events:none;animation:pulse 1s infinite alternate;z-index:6;letter-spacing:1px;border:3px solid #fff;font-family:monospace}
  @keyframes pulse{from{transform:translate(-50%,-50%) scale(1)}to{transform:translate(-50%,-50%) scale(1.06)}}
  #q-box{flex:0 0 auto;background:#fff;border-top:4px double #7d5a3c;padding:16px 22px calc(20px + env(safe-area-inset-bottom,0));z-index:5;min-height:108px;position:relative;box-shadow:inset 0 4px 0 rgba(0,0,0,.04)}
  #q-counter{font-size:11px;font-weight:800;color:#a06d3c;letter-spacing:1.5px;font-family:monospace}
  #q-text{font-size:19px;font-weight:800;color:#3a2814;line-height:1.4;margin-top:6px;word-break:keep-all;letter-spacing:-.2px}
  #q-box::after{content:'▼';position:absolute;right:20px;bottom:calc(10px + env(safe-area-inset-bottom,0));color:#7d5a3c;font-size:14px;animation:qbounce 1s infinite alternate}
  @keyframes qbounce{from{transform:translateY(0)}to{transform:translateY(4px)}}

  /* Result */
  #result{background:linear-gradient(180deg,#fff2d9 0%,#ffd7a3 100%);overflow-y:auto}
  .result-stat{display:flex;justify-content:space-between;padding:10px 14px;background:#fef6e7;border-radius:10px;margin-bottom:8px;font-size:15px}
  .result-stat strong{color:#7d5a3c}
  .score-board{background:linear-gradient(135deg,#fff7d0,#ffd97a);border:3px solid #d9a040;border-radius:14px;padding:16px;text-align:center;margin-bottom:12px}
  .score-board .score-label{font-size:12px;color:#7a5410;font-weight:700;letter-spacing:1px}
  .score-board .score-value{font-size:34px;font-weight:900;color:#c9881d;line-height:1;margin:6px 0;font-family:monospace}
  .score-board .score-suffix{font-size:18px;color:#a06d3c;font-weight:700;margin-left:4px}
  .score-board .score-grade{font-size:14px;font-weight:800;margin-top:4px;letter-spacing:.5px}
  .upload-status{margin-top:14px;padding:10px 14px;border-radius:10px;font-size:14px;text-align:center;font-weight:600}
  .upload-status.ok{background:#e6f4ea;color:#2e7d32}
  .upload-status.fail{background:#fdecea;color:#c0392b}
  .upload-status.pending{background:#fff4dc;color:#a06d3c}
  .replay-btn{width:100%;padding:13px;background:#fff;border:2px solid #d9b88a;color:#7d5a3c;font-size:15px;font-weight:700;border-radius:12px;margin-top:10px}
</style>
</head>
<body>

<div id="net-badge" class="net-badge online">● 온라인</div>

<div id="loading" class="screen">
  <div class="spinner"></div>
  <div style="color:#7d5a3c;font-weight:600">불러오는 중...</div>
</div>

<div id="intro" class="screen hidden">
  <div class="card">
    <div class="title">🏃 서베이런</div>
    <div class="subtitle">만족도 조사 게임</div>
    <div id="program-info" class="program-info"></div>
    <div class="field">
      <label>캐릭터 선택 <span class="hint" style="color:#7d5a3c">천안프렌즈 6종</span></label>
      <div class="char-grid" id="char-grid"></div>
    </div>
    <div class="field">
      <label for="nickname">닉네임 <span class="hint">실명 X · 별명/아이디만</span></label>
      <input id="nickname" type="text" maxlength="12" placeholder="별명 또는 게임 이름">
    </div>
    <div class="field">
      <label>성별</label>
      <div class="pill-row" id="gender-row">
        <label class="pill"><input type="radio" name="gender" value="남"><span>남자</span></label>
        <label class="pill"><input type="radio" name="gender" value="여"><span>여자</span></label>
      </div>
    </div>
    <div class="field">
      <label>교급</label>
      <div class="pill-row" id="school-row">
        <label class="pill"><input type="radio" name="school" value="초"><span>초등</span></label>
        <label class="pill"><input type="radio" name="school" value="중"><span>중등</span></label>
        <label class="pill"><input type="radio" name="school" value="고"><span>고등</span></label>
        <label class="pill"><input type="radio" name="school" value="대학"><span>대학</span></label>
        <label class="pill"><input type="radio" name="school" value="유아"><span>유아</span></label>
        <label class="pill"><input type="radio" name="school" value="일반"><span>일반</span></label>
      </div>
    </div>
    <div class="field">
      <label for="phone">전화번호 뒷 4자리</label>
      <input id="phone" type="tel" inputmode="numeric" maxlength="4" placeholder="0000">
    </div>
    <div id="form-err" class="err"></div>
    <button id="start-btn" class="start-btn">시작하기</button>
    <div class="help">
      <b>1탭=매우만족(5점) · 2탭=만족 · 3탭=보통 · 4탭=불만족 · 5탭=매우불만족(1점)</b><br>
      공중에서 빠르게 연타할수록 위 칸으로 올라갑니다.<br>
      탭하지 않으면 답이 안 됩니다 — 꼭 점프하세요!
    </div>
  </div>
</div>

<div id="game" class="screen hidden">
  <div id="top-bar">
    <span class="pill-stat">⏱ <span id="timer">0.0</span>s</span>
    <span class="pill-stat" id="score-pill">🏆 <b id="total-score">0</b>점</span>
    <span class="pill-stat">Q <span id="q-progress">1/1</span></span>
  </div>
  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
    <div id="slot-indicator">탭하세요!</div>
    <div id="tap-hint">▶ 탭해서 점프!</div>
  </div>
  <div id="q-box">
    <div id="q-counter"></div>
    <div id="q-text"></div>
  </div>
</div>

<div id="result" class="screen hidden">
  <div class="card">
    <div class="title">🎉 완주!</div>
    <div class="subtitle" id="result-name"></div>
    <div class="score-board">
      <div class="score-label">획득 점수</div>
      <div class="score-value"><span id="r-score">0</span><span class="score-suffix">점</span></div>
      <div class="score-grade" id="r-grade"></div>
    </div>
    <div class="result-stat"><span>완주 시간</span><strong id="r-time">0.0초</strong></div>
    <div class="result-stat"><span>응답 수</span><strong id="r-count">0개</strong></div>
    <div id="upload-status" class="upload-status pending">업로드 중...</div>
    <button id="replay-btn" class="replay-btn">새 응답 시작</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import { getFirestore, doc, getDoc, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBPI8wugVUAOcehqDkYHa-xXFX5vSKgWs4",
  authDomain: "hodoo-survey.firebaseapp.com",
  projectId: "hodoo-survey",
  storageBucket: "hodoo-survey.firebasestorage.app",
  messagingSenderId: "917750738044",
  appId: "1:917750738044:web:b3023dee781b31640d2df9"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const $ = id => document.getElementById(id);
const params = new URLSearchParams(location.search);
const programId = params.get("p");
const isDemo = params.get("demo") === "1";

const SLOT_LABELS = ["매우만족","만족","보통","불만족","매우불만족"];
const SLOT_COLORS = ["#2e7d32","#7cb342","#fbc02d","#fb8c00","#e53935"];
const QUEUE_KEY = "hodoo_queue";
const PROG_CACHE_KEY = pid => "hodoo_prog_" + pid;

let program = null;

function updateNet(){
  const b = $("net-badge");
  if (navigator.onLine){ b.className = "net-badge online"; b.textContent = "● 온라인"; }
  else { b.className = "net-badge offline"; b.textContent = "● 오프라인"; }
}
window.addEventListener("online", () => { updateNet(); flushQueue(); });
window.addEventListener("offline", updateNet);
updateNet();

async function flushQueue(){
  const q = JSON.parse(localStorage.getItem(QUEUE_KEY) || "[]");
  if (!q.length) return;
  const remain = [];
  for (const item of q){
    try { await addDoc(collection(db,"responses"), {...item, ts: serverTimestamp(), uploadedFromQueue:true}); }
    catch(e){ remain.push(item); }
  }
  localStorage.setItem(QUEUE_KEY, JSON.stringify(remain));
}
flushQueue();

async function loadProgram(){
  if (isDemo){
    program = { id:"demo", name:"데모 프로그램", date:"2026-04-28", surveyName:"미리보기 데모",
      questions:[
        {text:"오늘 프로그램에 만족하셨나요?"},
        {text:"진행자 안내는 친절했나요?"},
        {text:"다음에도 참여하고 싶나요?"}
      ]};
    showIntro();
    return;
  }
  if (!programId){
    showError("프로그램 ID가 없습니다.\nQR을 다시 스캔해주세요.");
    return;
  }
  try {
    const snap = await getDoc(doc(db,"programs",programId));
    if (!snap.exists()){ showError("프로그램을 찾을 수 없습니다."); return; }
    program = { id: snap.id, ...snap.data() };
    localStorage.setItem(PROG_CACHE_KEY(programId), JSON.stringify(program));
  } catch(e){
    const cached = localStorage.getItem(PROG_CACHE_KEY(programId));
    if (cached){ program = JSON.parse(cached); }
    else { showError("프로그램 로드 실패.\n인터넷 연결을 확인하세요."); return; }
  }
  if (!program.questions || !program.questions.length){
    showError("등록된 질문이 없습니다."); return;
  }
  showIntro();
}

function showError(msg){
  $("loading").innerHTML = '<div style="color:#c0392b;font-weight:700;text-align:center;line-height:1.6;white-space:pre-line">'+msg+'</div>';
}
function showIntro(){
  $("loading").classList.add("hidden");
  $("intro").classList.remove("hidden");
  $("program-info").innerHTML = '<strong>'+escapeHtml(program.name||"")+'</strong>'
    + (program.date ? '<span>'+escapeHtml(program.date)+'</span>' : '')
    + (program.surveyName ? '<div style="margin-top:4px;font-size:12px">'+escapeHtml(program.surveyName)+'</div>' : '');
  const saved = JSON.parse(sessionStorage.getItem("hodoo_user")||"{}");
  if (saved.name) $("nickname").value = saved.name;
  if (saved.gender){
    const r = document.querySelector('input[name="gender"][value="'+saved.gender+'"]');
    if (r) r.checked = true;
  }
  if (saved.school){
    const r = document.querySelector('input[name="school"][value="'+saved.school+'"]');
    if (r) r.checked = true;
  }
  if (saved.charId){
    const c = CHARACTERS.find(x => x.id === saved.charId);
    if (c) currentChar = c;
  }
  renderCharacterGrid();
}

function renderCharacterGrid(){
  const grid = $("char-grid");
  if (!grid) return;
  grid.innerHTML = "";
  // 모든 카드의 캔버스를 동일한 비주얼 크기로 — 가장 큰 캐릭터에 맞춰 통일 (작은 캐릭터는 아래에 배치)
  const maxBodyH = Math.max(...CHARACTERS.map(c => c.body.length + c.legsA.length));
  const maxBodyW = Math.max(...CHARACTERS.map(c => c.body[0].length));
  const previewScale = 4;
  const cvW = maxBodyW * previewScale;
  const cvH = maxBodyH * previewScale;
  CHARACTERS.forEach(c => {
    const card = document.createElement("button");
    card.type = "button";
    card.className = "char-card" + (currentChar.id === c.id ? " selected" : "");
    card.dataset.charId = c.id;
    const cv = document.createElement("canvas");
    cv.width = cvW; cv.height = cvH;
    const ctx = cv.getContext("2d");
    ctx.imageSmoothingEnabled = false;
    const previewPalette = Object.assign({}, PALETTE, c.pal);
    const sprite = c.body.concat(c.legsA);
    // 캐릭터를 캔버스 가운데 (가로) + 바닥 (세로) 정렬
    const charPxW = c.body[0].length * previewScale;
    const charPxH = sprite.length * previewScale;
    const ox = (cvW - charPxW) / 2;
    const oy = cvH - charPxH;
    drawSprite(sprite, ox, oy, previewPalette, ctx, previewScale);
    card.appendChild(cv);
    const nm = document.createElement("span");
    nm.className = "nm";
    nm.textContent = c.name;
    card.appendChild(nm);
    card.addEventListener("click", () => {
      currentChar = c;
      renderCharacterGrid();
    });
    grid.appendChild(card);
  });
}
function escapeHtml(s){return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

$("start-btn").addEventListener("click", () => {
  const name = $("nickname").value.trim();
  const phone = $("phone").value.trim();
  const gender = (document.querySelector('input[name="gender"]:checked')||{}).value || "";
  const school = (document.querySelector('input[name="school"]:checked')||{}).value || "";
  if (!name){ $("form-err").textContent = "닉네임을 입력해주세요."; return; }
  if (name.length < 2){ $("form-err").textContent = "닉네임은 2자 이상 입력해주세요."; return; }
  if (!gender){ $("form-err").textContent = "성별을 선택해주세요."; return; }
  if (!school){ $("form-err").textContent = "교급을 선택해주세요."; return; }
  if (!/^\d{4}$/.test(phone)){ $("form-err").textContent = "전화번호 뒷 4자리를 입력해주세요."; return; }
  $("form-err").textContent = "";
  const charId = currentChar.id;
  sessionStorage.setItem("hodoo_user", JSON.stringify({name,phone,gender,school,charId}));
  startGame({name, phone, gender, school, charId});
});

// ===== 픽셀 아트 캐릭터 (천안프렌즈 6종) =====
// 색상 키: '.'=투명, b/B=머리, W=하양, e=눈동자, p=볼터치, s=미소, c/C=옷, r=악센트(타이/콜라), L=잎/머리장식, t=바지, k=신발
const PALETTE = {
  ".": null,
  "b": "#c08550",
  "B": "#8b5a2b",
  "W": "#ffffff",
  "e": "#2a3a6b",
  "p": "#ff8aa8",
  "s": "#7d4422",
  "c": "#fdd835",
  "C": "#f9a825",
  "r": "#c63a3a",
  "L": "#5fa84d",
  "t": "#5a5a5a",
  "k": "#1a1a1a"
};

// 천안프렌즈 6종 — 캐릭터별로 고유한 스프라이트(체형·키·악세서리) + 색상
// 각 행은 14자, 캐릭터별로 높이가 다름 (오이사/순대리는 더 큼)
const CHARACTERS = [
  {

  return Object.assign({}, PALETTE, currentChar.pal);
}
function curCharBody(){ return currentChar.body; }
function curCharLegs(frame, onGround){

  return currentChar.legsA;
}

const PX = 3;
// 캐릭터별 키가 다르므로 벽 구멍은 최대 키 기준으로 잡음
const MAX_SPRITE_H = Math.max(...CHARACTERS.map(c => c.body.length + c.legsA.length));
const MAX_CHAR_H = MAX_SPRITE_H * PX;
const HOLE_H = MAX_CHAR_H + 16;
const WALL_W = 11 * PX;
const SLOTS = 5;

// ===== 점프 물리 (결정론적: 탭 N번 = 슬롯 N) =====
const GRAVITY = 0.0028;        // px/ms²
const SPEED = 0.30;            // 벽 스크롤 속도 px/ms
const FIRST_DIST = 720;        // 첫 벽까지 거리
const WALL_DIST = 560;         // 이후 벽 간격
// 슬롯 1도 지면에서 떠 있어 — 점프해야 답이 됨
let SLOT_HS = [70, 180, 290, 400, 510];
const BASE_SLOT_HS = [70, 180, 290, 400, 510];

const cv = $("canvas");
const cx = cv.getContext("2d");
let W=0, H=0, DPR=1, TOP_MARGIN=100, BOTTOM_MARGIN=70;

function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  // 캔버스 컨테이너(상하 바 제외) 크기 측정
  const wrap = $("canvas-wrap");
  const rect = wrap.getBoundingClientRect();
  W = Math.round(rect.width);
  H = Math.round(rect.height);
  if (H < 200) H = 200;
  cv.width = Math.round(W*DPR);
  cv.height = Math.round(H*DPR);
  cv.style.width = W + "px";
  cv.style.height = H + "px";
  cx.setTransform(DPR,0,0,DPR,0,0);
  cx.imageSmoothingEnabled = false;
  // 캔버스 내부 여백 (구름/지면)
  TOP_MARGIN = 24;
  BOTTOM_MARGIN = 36;
  // 화면 높이에 맞게 슬롯 높이 스케일링 (최대 키 캐릭터 기준)
  const groundY = H - BOTTOM_MARGIN;
  const minTopY = TOP_MARGIN + MAX_CHAR_H + 6;
  const maxAbove = Math.max(160, groundY - minTopY);
  const refMax = 540;
  const scale = Math.min(1, maxAbove / refMax);
  SLOT_HS = BASE_SLOT_HS.map(h => h * scale);
}
window.addEventListener("resize", () => { if (game) resize(); });

function feetYAtSlot(s){
  const groundY = H - BOTTOM_MARGIN;
  return groundY - SLOT_HS[s-1];
}
function slotCenterY(s){
  return feetYAtSlot(s) - MAX_CHAR_H/2;
}
function computeSlotFromFeet(feetY){
  const groundY = H - BOTTOM_MARGIN;
  const above = Math.max(0, groundY - feetY);
  let best = 0, bestD = Infinity;
  for (let i=0; i<5; i++){
    const d = Math.abs(above - SLOT_HS[i]);
    if (d < bestD){ bestD = d; best = i; }
  }
  return best + 1;
}

function drawSprite(rows, ox, oy, paletteOverride, ctx, scale){
  const pal = paletteOverride || PALETTE;
  const drawCtx = ctx || cx;
  const px = scale || PX;
  const h = rows.length;
  const w = rows[0].length;
  for (let r=0; r<h; r++){
    const line = rows[r];
    for (let c=0; c<w; c++){
      const ch = line[c];
      const color = pal[ch];
      if (color){
        drawCtx.fillStyle = color;
        drawCtx.fillRect(Math.round(ox + c*px), Math.round(oy + r*px), px, px);
      }
    }
  }
}

  scheduleFrame();
}

function scheduleFrame(){
  if (document.hidden) setTimeout(() => loop(performance.now()), 16);
  else requestAnimationFrame(loop);
}

// 장애물 정의: size 1·2·3 (높이 칸 수). 1칸≈슬롯1 절반, 2칸≈슬롯1 정점, 3칸≈슬롯1과 슬롯2 사이
function makeObstacle(x){
  const r = Math.random();
  let size, kind;
  if (r < 0.5){ size = 1; }
  else if (r < 0.85){ size = 2; }
  else { size = 3; }
  // 디자인 종류 — size에 따라 다르게 (시각적 다양성)
  if (size === 1) kind = Math.random() < 0.5 ? 'cone' : 'rock';
  else if (size === 2) kind = Math.random() < 0.5 ? 'box' : 'bush';
  else kind = Math.random() < 0.5 ? 'log' : 'tower';
  return { x, size, kind, passed: false };
}
function obstacleHeight(o){
  // 점프해야 통과 가능한 높이 (충돌 검사용 픽셀)
  if (o.size === 1) return 14*PX; // 42 — 슬롯1(70)으로 통과
  if (o.size === 2) return 22*PX; // 66 — 슬롯1(70) 아슬아슬, 슬롯2 안전
  return 32*PX;                    // 96 — 슬롯2+ 필요
}
function obstacleHalfW(o){
  if (o.size === 1) return 7*PX;
  if (o.size === 2) return 10*PX;
  return 13*PX;
}

function spawnNextWall(distance, qIdx, includeObstacle = true){
  game.walls.push({
    x: W + distance,
    passed: false,
    qIdx: qIdx
  });
  // 벽 사이마다 장애물 1개 항상 등장 (첫 벽 전 제외)
  if (includeObstacle){
    const offset = distance * (0.42 + Math.random() * 0.25);
    game.obstacles.push(makeObstacle(W + offset));
  }
}

function jump(){
  if (!game || game.finished) return;
  if ((game.stunUntil||0) > performance.now()) return;
  if (game.showHint){ game.showHint = false; $("tap-hint").classList.add("hidden"); }
  const p = game.player;
  const wasOnGround = (p.phase === 'ground');
  // ground/falling: 새 시퀀스 시작 (잘못된 점프 복구 가능) — tapCount 1로 리셋
  // rising/holding: 체인 (한 슬롯 위로)
  if (p.phase === 'ground' || p.phase === 'falling'){
    p.tapCount = 1;
  } else {
    if (p.tapCount >= 5) return;
    p.tapCount++;
  }
  p.phase = 'rising';
  p.vy = 0;
  if (wasOnGround) spawnDust(p.x, H - BOTTOM_MARGIN);
  spawnCombo(p.x, p.feetY - curCharH() + 4, p.tapCount);
}
function updateSlotIndicator(){
  if (!game) return;
  const tc = game.player.tapCount;
  if (tc === 0){
    $("slot-indicator").textContent = "탭하세요!";
    $("slot-indicator").style.borderColor = "#1a1a1a";
    $("slot-indicator").style.color = "#1a1a1a";
  } else {
    const s = Math.min(5, tc);
    const score = 6 - s;
    $("slot-indicator").textContent = score + "점·" + SLOT_LABELS[s-1];
    $("slot-indicator").style.borderColor = SLOT_COLORS[s-1];
    $("slot-indicator").style.color = SLOT_COLORS[s-1];
  }
}

// ===== 파티클 시스템 =====
let dust = [], combos = [], texts = [];
function spawnDust(x, baseY){
  for (let i=0; i<6; i++){
    dust.push({
      x: x + (Math.random()-0.5)*curCharW()*0.7,
      y: baseY - 2,
      vx: (Math.random()-0.5)*0.18,
      vy: -Math.random()*0.14 - 0.04,
      life: 0,
      max: 350 + Math.random()*200
    });
  }
}
function spawnCombo(x, y, n){
  combos.push({ x, y, n, life: 0, max: 600 });
}
function spawnText(x, y, msg, color){
  texts.push({ x, y, msg, color, life: 0, max: 850 });
}
function updateParticles(dt){
  for (let i=dust.length-1; i>=0; i--){
    const d = dust[i];
    d.life += dt;
    if (d.life > d.max){ dust.splice(i,1); continue; }
    d.x += d.vx*dt;
    d.y += d.vy*dt;
    d.vy += 0.0004*dt;
  }
  for (let i=combos.length-1; i>=0; i--){
    const c = combos[i];
    c.life += dt;
    if (c.life > c.max){ combos.splice(i,1); continue; }
    c.y -= 0.045*dt;
  }
  for (let i=texts.length-1; i>=0; i--){
    const t = texts[i];
    t.life += dt;
    if (t.life > t.max){ texts.splice(i,1); continue; }
    t.y -= 0.04*dt;
  }
}
function drawParticles(){
  for (const d of dust){
    const alpha = 1 - (d.life/d.max);
    cx.fillStyle = `rgba(160,128,80,${alpha*0.85})`;
    pxRect(Math.round(d.x), Math.round(d.y), PX, PX);
  }
  for (const c of combos){
    const alpha = 1 - (c.life/c.max);
    const grow = Math.min(1, c.life/120);
    const size = 16 + 10*grow;
    cx.save();
    cx.globalAlpha = alpha;
    cx.font = `900 ${Math.round(size)}px monospace`;
    cx.textAlign = "center";
    cx.textBaseline = "middle";
    cx.lineWidth = 5;
    cx.strokeStyle = "#fff";
    cx.fillStyle = SLOT_COLORS[Math.min(c.n-1,4)];
    cx.strokeText("x"+c.n, c.x, c.y);
    cx.fillText("x"+c.n, c.x, c.y);
    cx.restore();
  }
  for (const t of texts){
    const alpha = 1 - (t.life/t.max);
    const grow = Math.min(1, t.life/100);
    const size = 18 + 6*grow;
    cx.save();
    cx.globalAlpha = alpha;
    cx.font = `900 ${Math.round(size)}px sans-serif`;
    cx.textAlign = "center";
    cx.textBaseline = "middle";
    cx.lineWidth = 5;
    cx.strokeStyle = "#fff";
    cx.fillStyle = t.color;
    cx.strokeText(t.msg, t.x, t.y);
    cx.fillText(t.msg, t.x, t.y);
    cx.restore();
  }
}

function drawGrass(){
  const groundY = H - BOTTOM_MARGIN;
  for (let i=0; i<14; i++){
    const xb = ((i*95 - game.runX*0.6) % (W+90) + (W+90)) % (W+90) - 45;
    cx.fillStyle = "#86b25c";
    pxRect(xb, groundY - PX*2, PX*2, PX);
    pxRect(xb+PX*2, groundY - PX*3, PX, PX*2);
    pxRect(xb+PX*3, groundY - PX*2, PX*2, PX);
    cx.fillStyle = "#638b3f";
    pxRect(xb+PX*2, groundY - PX*3, PX, PX);
  }
}
cv.addEventListener("touchstart", e => { e.preventDefault(); jump(); }, {passive:false});
cv.addEventListener("mousedown", jump);
window.addEventListener("keydown", e => { if (e.code==="Space"||e.code==="ArrowUp"){ e.preventDefault(); jump(); }});

let lastT = 0;
function loop(t){
  if (!game) return;
  const dt = lastT ? Math.min(50, t - lastT) : 16;
  lastT = t;

  // 배경
  cx.fillStyle = "#fbf3dc";
  cx.fillRect(0,0,W,H);

  drawClouds();
  drawGround();
  drawGrass();
  drawSlotGuide();

  // 스턴 (장애물 충돌 시): 화면 흔들림 + 스크롤 멈춤
  const now = performance.now();
  const stunned = (game.stunUntil||0) > now;
  const moveX = stunned ? 0 : SPEED * dt;
  if (!stunned) game.runX += moveX;

  // 장애물 업데이트 + 충돌 검사 + 그리기 (높이별 충돌)
  const groundY0 = H - BOTTOM_MARGIN;
  for (const o of (game.obstacles||[])){
    o.x -= moveX;
    drawObstacle(o);
    if (o.passed) continue;
    const hw = obstacleHalfW(o);
    const oh = obstacleHeight(o);
    const obsTop = groundY0 - oh;
    const overlapX = Math.abs(o.x - game.player.x) < hw + curCharW()*0.35;
    if (overlapX){
      // 플레이어 발이 장애물 윗면보다 아래(=장애물에 부딪힘)
      if (game.player.feetY > obsTop - PX){
        o.passed = true;
        game.stunUntil = now + 700;
        game.penaltyMs = (game.penaltyMs||0) + 700;
        spawnText(game.player.x, game.player.feetY - curCharH() - 8, "충돌!", "#e53935");
      } else if (o.x + hw < game.player.x){
        o.passed = true;
      }
    }
  }
  game.obstacles = (game.obstacles||[]).filter(o => o.x > -60);

  // 플레이어 phase 기반 업데이트
  // ground → (탭) → rising → holding(짧음) → falling → ground
  const p = game.player;
  const groundY = H - BOTTOM_MARGIN;
  if (p.phase === 'rising'){
    const target = groundY - SLOT_HS[Math.max(1, p.tapCount) - 1];
    const dy = target - p.feetY;
    p.feetY += dy * 0.32;
    p.vy = 0;
    if (Math.abs(dy) < 1){
      p.feetY = target;
      p.phase = 'holding';
      p.holdEnd = performance.now() + 220; // 정점에서 살짝 정지
    }
  } else if (p.phase === 'holding'){
    if (performance.now() >= (p.holdEnd||0)){
      p.phase = 'falling';
      p.vy = 0;
    }
  } else if (p.phase === 'falling'){
    p.vy += GRAVITY * 1.6 * dt;
    p.feetY += p.vy * dt;
    if (p.feetY >= groundY){
      p.feetY = groundY;
      p.vy = 0;
      p.phase = 'ground';
      // tapCount은 유지 (벽 통과시 사용) — 단, 플레이어가 다시 탭하면 jump()에서 1로 리셋
    }
  }
  updateSlotIndicator();

  // 벽 업데이트 + 충돌
  for (const w of game.walls){
    w.x -= moveX;
    drawWall(w);
    if (!w.passed && w.x + WALL_W*0.5 <= p.x){
      w.passed = true;
      // 탭 횟수가 곧 슬롯 (1탭=슬롯1, 5탭=슬롯5). 점수는 반전: 슬롯1=5점, 슬롯5=1점
      let slot, missed = false;
      if (p.tapCount === 0){
        slot = 1;
        missed = true;
        game.penaltyMs = (game.penaltyMs||0) + 1500;
      } else {
        slot = Math.min(5, p.tapCount);
      }
      const score = 6 - slot;
      game.answers.push({
        q: game.questions[w.qIdx].text || game.questions[w.qIdx],
        a: score,
        slot: slot,
        label: SLOT_LABELS[slot-1]
      });
      // 획득 점수 누적 (5점=매우만족이 가장 높음 → 매우만족 응답을 자연스럽게 유도)
      game.totalScore += score;
      $("total-score").textContent = game.totalScore;
      flashHole(slot);
      if (missed){
        spawnText(p.x, p.feetY - curCharH() - 12, "탭 안 함!", "#e53935");
      } else {
        // "+N점" 강조 + 라벨
        spawnText(p.x, p.feetY - curCharH() - 12, "+" + score + "점 " + SLOT_LABELS[slot-1], SLOT_COLORS[slot-1]);
      }
      // 벽 통과 후 다음 벽을 위해 리셋 — 공중이면 자연 낙하
      if (p.phase !== 'ground'){
        p.phase = 'falling';
        p.vy = 0;
      }
      p.tapCount = 0;
      game.qIdx++;
      if (game.qIdx < game.questions.length){
        $("q-text").textContent = game.questions[game.qIdx].text || game.questions[game.qIdx];
        $("q-counter").textContent = "QUESTION " + (game.qIdx+1);
        $("q-progress").textContent = (game.qIdx+1) + "/" + game.questions.length;
        spawnNextWall(WALL_DIST, game.qIdx);
      } else {
        finishGame();
      }
    }
  }
  game.walls = game.walls.filter(w => w.x > -120);

  drawPlayer();
  drawFlash();
  updateParticles(dt);
  drawParticles();

  // HUD (페널티 시간을 함께 표시)
  const elapsed = (performance.now() - game.startTs)/1000;
  const penSec = (game.penaltyMs||0)/1000;
  $("timer").textContent = elapsed.toFixed(1) + (penSec>0 ? " (+"+penSec.toFixed(1)+")" : "");

  if (!game.finished) scheduleFrame();
}

// 구름 (픽셀)
function drawClouds(){
  cx.fillStyle = "#e8dcb6";
  for (let i=0;i<3;i++){
    const baseX = ((i*240 - game.runX*0.12) % (W+260) + (W+260)) % (W+260) - 130;
    const cy = TOP_MARGIN + 30 + i*18;
    pxRect(baseX, cy, 6*PX, 2*PX);
    pxRect(baseX+2*PX, cy-PX, 8*PX, 2*PX);
    pxRect(baseX+4*PX, cy-2*PX, 6*PX, 2*PX);
    pxRect(baseX+10*PX, cy, 4*PX, 2*PX);
  }
}

function drawGround(){
  const y = H - BOTTOM_MARGIN;
  // 굵은 지면 라인
  cx.fillStyle = "#7d5a3c";
  cx.fillRect(0, y, W, PX);
  // 점선 디테일 (스크롤)
  cx.fillStyle = "#a07c4a";
  const dashW = 4*PX;
  const gap = 3*PX;
  const period = dashW + gap;
  const offset = -((game.runX) % period);
  for (let x = offset; x < W; x += period){
    cx.fillRect(Math.round(x), y + PX, dashW, PX);
  }
  // 작은 자갈
  cx.fillStyle = "#8b6238";
  for (let i=0; i<6; i++){
    const px = ((i*180 - game.runX*0.6) % (W+80) + (W+80)) % (W+80) - 40;
    pxRect(px, y + 3*PX, PX, PX);
    pxRect(px + 4*PX, y + 4*PX, PX, PX);
  }
}

function pxRect(x,y,w,h){
  cx.fillRect(Math.round(x), Math.round(y), Math.round(w), Math.round(h));
}

function drawWall(w){
  const wx = w.x;
  const ground = H - BOTTOM_MARGIN;
  const top = TOP_MARGIN;
  if (wx > W + WALL_W) return;
  if (wx < -WALL_W) return;

  // 구멍 영역
  const holes = [];
  for (let s=1;s<=SLOTS;s++){
    const cy = slotCenterY(s);
    holes.push({y1: cy - HOLE_H/2, y2: cy + HOLE_H/2, slot: s});
  }
  holes.sort((a,b)=>a.y1-b.y1);

  // 벽 본체 (픽셀 컬러 블록)
  cx.fillStyle = "#3d2a5c";
  if (holes[0].y1 > top) pxRect(wx, top, WALL_W, holes[0].y1 - top);
  for (let i=0;i<holes.length-1;i++){
    pxRect(wx, holes[i].y2, WALL_W, holes[i+1].y1 - holes[i].y2);
  }
  if (holes[holes.length-1].y2 < ground) pxRect(wx, holes[holes.length-1].y2, WALL_W, ground - holes[holes.length-1].y2);

  // 픽셀 디테일 (벽돌 패턴)
  cx.fillStyle = "#5a4280";
  for (let by = top; by < ground; by += PX*4){
    if (holes.some(h => by >= h.y1 - PX && by < h.y2)) continue;
    pxRect(wx, by, PX, PX);
    pxRect(wx + WALL_W - PX, by + PX*2, PX, PX);
  }
  // 좌우 모서리 음영
  cx.fillStyle = "#1f1238";
  for (let i=0;i<holes.length-1;i++){
    pxRect(wx + WALL_W - PX, holes[i].y2, PX, holes[i+1].y1 - holes[i].y2);
  }

  // 구멍 테두리
  const liveSlot = game ? computeSlotFromFeet(game.player.feetY) : 0;
  for (let s=1;s<=SLOTS;s++){
    const cy = slotCenterY(s);
    const isLive = (liveSlot === s);
    cx.fillStyle = SLOT_COLORS[s-1];
    pxRect(wx - PX, cy - HOLE_H/2 - PX, WALL_W + PX*2, PX);
    pxRect(wx - PX, cy + HOLE_H/2, WALL_W + PX*2, PX);
    if (isLive){
      const alpha = 0.4 + 0.4*Math.sin(performance.now()/140);
      cx.save();
      cx.globalAlpha = alpha;
      cx.fillStyle = SLOT_COLORS[s-1];
      pxRect(wx - PX, cy - HOLE_H/2, PX, HOLE_H);
      pxRect(wx + WALL_W, cy - HOLE_H/2, PX, HOLE_H);
      cx.restore();
    }
  }

  // 라벨 (점수·라벨, 슬롯 기반)
  if (wx < W + 30 && wx > -200){
    cx.font = "800 12px -apple-system,sans-serif";
    cx.textAlign = "left";
    cx.textBaseline = "middle";
    for (let s=1;s<=SLOTS;s++){
      const cy = slotCenterY(s);
      const score = 6 - s;
      const text = score + "점 " + SLOT_LABELS[s-1];
      const tw = cx.measureText(text).width + 12;
      cx.fillStyle = "rgba(255,255,255,.94)";
      pxRect(wx + WALL_W + 6, cy - 11, tw, 22);
      cx.fillStyle = SLOT_COLORS[s-1];
      pxRect(wx + WALL_W + 6, cy - 11, PX, 22);
      cx.fillStyle = "#3a2814";
      cx.fillText(text, wx + WALL_W + 12, cy);
    }
  }
}

let flashState = null;
function flashHole(slot){ flashState = { slot, t: 0 }; }
function drawFlash(){
  if (!flashState) return;
  flashState.t += 1;
  const cy = slotCenterY(flashState.slot);
  cx.save();
  cx.globalAlpha = Math.max(0, 1 - flashState.t/22);
  cx.fillStyle = SLOT_COLORS[flashState.slot-1];
  cx.fillRect(0, cy - HOLE_H/2, W, HOLE_H);
  cx.restore();
  if (flashState.t > 22) flashState = null;
}

function drawSlotGuide(){
  // 5개 슬롯 위치를 점선으로 안내
  const groundY = H - BOTTOM_MARGIN;
  for (let s=2; s<=5; s++){
    const y = groundY - SLOT_HS[s-1];
    cx.fillStyle = SLOT_COLORS[s-1] + "40";
    for (let x=0; x<W; x+=PX*4){
      cx.fillRect(Math.round(x), Math.round(y), PX*2, 1);
    }
  }
}

function drawPlayer(){
  game.frame++;
  const p = game.player;
  const onGround = (p.phase === 'ground');
  const legs = curCharLegs(game.frame, onGround);
  const bobOffset = onGround ? (Math.floor(game.frame/6) % 2 === 0 ? 0 : -PX) : 0;
  const stunned = (game.stunUntil||0) > performance.now();
  const shakeX = stunned ? Math.sin(performance.now()/35) * 3 : 0;
  const body = curCharBody();
  const sprite = body.concat(legs);
  const charW = body[0].length * PX;
  const charH = sprite.length * PX;

  const ox = p.x - charW/2 + shakeX;
  const oy = p.feetY - charH + bobOffset;

  // 그림자 — 항상 지면에 (점프해도 지면에 고정)
  const groundY = H - BOTTOM_MARGIN;
  const heightAbove = Math.max(0, groundY - p.feetY);
  const shadowAlpha = Math.max(0.06, 0.22 - heightAbove*0.0003);
  const shadowW = curCharW() - 4*PX - Math.min(curCharW()*0.4, heightAbove*0.05);
  cx.fillStyle = `rgba(0,0,0,${shadowAlpha})`;
  pxRect(p.x - shadowW/2, groundY - PX, shadowW, PX);

  drawSprite(sprite, ox, oy, getCharPalette());
}

function finishGame(){
  game.finished = true;
  const elapsed = (performance.now() - game.startTs)/1000;
  const penSec = (game.penaltyMs||0)/1000;
  $("game").classList.add("hidden");
  $("result").classList.remove("hidden");
  $("result-name").textContent = game.name + " 님";
  // 획득 점수 + 등급 (만점 비공개 — 획득 점수 자체에 집중)
  const total = game.totalScore || 0;
  const max = game.questions.length * 5;
  $("r-score").textContent = total;
  const ratio = max > 0 ? total/max : 0;
  let grade, gradeColor;
  if (ratio >= 0.9){ grade = "🏆 최고예요!"; gradeColor = "#2e7d32"; }
  else if (ratio >= 0.7){ grade = "👍 좋아요!"; gradeColor = "#7cb342"; }
  else if (ratio >= 0.5){ grade = "🙂 보통이에요"; gradeColor = "#fbc02d"; }
  else { grade = "💪 다음엔 더 잘!"; gradeColor = "#fb8c00"; }
  $("r-grade").textContent = grade;
  $("r-grade").style.color = gradeColor;
  $("r-time").textContent = (elapsed + penSec).toFixed(1) + "초" + (penSec>0 ? " (페널티 +"+penSec.toFixed(1)+"초)" : "");
  $("r-count").textContent = game.answers.length + "개";

  if (isDemo){
    $("upload-status").className = "upload-status pending";
    $("upload-status").textContent = "🔧 데모 모드 — 업로드 생략";
    return;
  }

  const payload = {
    programId: program.id,
    programName: program.name || "",
    surveyName: program.surveyName || "",
    date: program.date || "",
    name: game.name,
    phone: game.phone,
    gender: game.gender || "",
    school: game.school || "",
    character: game.charId || "",
    characterName: game.charName || "",
    timeSec: +elapsed.toFixed(2),
    penaltySec: +((game.penaltyMs||0)/1000).toFixed(2),
    totalScore: game.totalScore || 0,
    maxScore: (game.questions.length||0) * 5,
    answers: game.answers,
    clientTs: Date.now()
  };
  uploadResponse(payload);
}

async function uploadResponse(data){
  const status = $("upload-status");
  status.className = "upload-status pending";
  status.textContent = "업로드 중...";
  try {
    if (!navigator.onLine) throw new Error("offline");
    await addDoc(collection(db,"responses"), { ...data, ts: serverTimestamp() });
    status.className = "upload-status ok";
    status.textContent = "✅ 응답이 저장되었습니다";
  } catch(e){
    const q = JSON.parse(localStorage.getItem(QUEUE_KEY) || "[]");
    q.push(data);
    localStorage.setItem(QUEUE_KEY, JSON.stringify(q));
    status.className = "upload-status fail";
    status.textContent = "📦 오프라인 - 임시 저장됨 (재접속 시 자동 업로드)";
  }
}

$("replay-btn").addEventListener("click", () => {
  $("result").classList.add("hidden");
  $("nickname").value = "";
  $("phone").value = "";
  $("intro").classList.remove("hidden");
});

window.addEventListener("error", e => {
  if (!game) return;
  console.error("game error:", e.message);
});

loadProgram();
