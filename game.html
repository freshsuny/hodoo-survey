<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#7d5a3c">
<title>호두 달리기 만족도 게임</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
  html,body{height:100%;overflow:hidden;background:#fff5e6;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;color:#333}
  button{border:none;cursor:pointer;font-family:inherit}
  input{font-family:inherit;font-size:16px}
  .screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
  .hidden{display:none!important}

  /* Loading */
  #loading{background:linear-gradient(180deg,#fff2d9 0%,#ffe0b8 100%)}
  .spinner{width:50px;height:50px;border:5px solid #d9b88a;border-top-color:#7d5a3c;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:16px}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* Intro */
  #intro{background:linear-gradient(180deg,#fff2d9 0%,#ffe0b8 100%);overflow-y:auto}
  .card{background:#fff;border-radius:18px;padding:24px 22px;width:100%;max-width:380px;box-shadow:0 10px 30px rgba(125,90,60,.18)}
  .title{font-size:26px;font-weight:800;color:#7d5a3c;text-align:center;margin-bottom:6px}
  .subtitle{font-size:14px;color:#9a7a5a;text-align:center;margin-bottom:18px}
  .program-info{background:#fef6e7;border:1px dashed #d9b88a;border-radius:12px;padding:12px;margin-bottom:16px;font-size:14px;color:#7d5a3c;text-align:center}
  .program-info strong{font-size:16px;display:block;margin-bottom:4px}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:13px;font-weight:600;color:#7d5a3c;margin-bottom:6px}
  .field input{width:100%;padding:12px 14px;border:2px solid #e8d4b6;border-radius:10px;font-size:16px;outline:none;background:#fffaf0}
  .field input:focus{border-color:#c89b6a}
  .start-btn{width:100%;padding:14px;background:linear-gradient(135deg,#d9a06b,#7d5a3c);color:#fff;font-size:17px;font-weight:700;border-radius:12px;margin-top:8px;box-shadow:0 4px 12px rgba(125,90,60,.3)}
  .start-btn:active{transform:translateY(1px)}
  .help{font-size:12px;color:#9a7a5a;margin-top:14px;line-height:1.5;text-align:center}
  .err{color:#c0392b;font-size:13px;margin-top:6px}
  .net-badge{position:fixed;top:10px;right:10px;font-size:11px;padding:4px 8px;border-radius:8px;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.1);z-index:20}
  .net-badge.online{color:#2e7d32}
  .net-badge.offline{color:#c0392b}

  /* Game */
  #game{background:linear-gradient(180deg,#cfe9ff 0%,#fde6c1 70%,#e2b478 100%);padding:0}
  #q-box{position:absolute;top:0;left:0;right:0;background:rgba(255,255,255,.96);padding:14px 16px 12px;box-shadow:0 4px 14px rgba(0,0,0,.08);z-index:5}
  #q-counter{font-size:12px;font-weight:700;color:#a06d3c;letter-spacing:.5px}
  #q-text{font-size:18px;font-weight:800;color:#3a2814;line-height:1.35;margin-top:4px;word-break:keep-all}
  #hud{position:absolute;left:0;right:0;bottom:0;display:flex;justify-content:space-between;padding:10px 16px;background:rgba(255,255,255,.85);font-size:13px;color:#5a3a1c;font-weight:600;z-index:5}
  #tap-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.55);color:#fff;padding:14px 22px;border-radius:14px;font-size:16px;font-weight:700;pointer-events:none;animation:pulse 1s infinite alternate;z-index:6}
  @keyframes pulse{from{transform:translate(-50%,-50%) scale(1)}to{transform:translate(-50%,-50%) scale(1.06)}}
  #canvas{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none}

  /* Result */
  #result{background:linear-gradient(180deg,#fff2d9 0%,#ffd7a3 100%);overflow-y:auto}
  .result-stat{display:flex;justify-content:space-between;padding:10px 14px;background:#fef6e7;border-radius:10px;margin-bottom:8px;font-size:15px}
  .result-stat strong{color:#7d5a3c}
  .upload-status{margin-top:14px;padding:10px 14px;border-radius:10px;font-size:14px;text-align:center;font-weight:600}
  .upload-status.ok{background:#e6f4ea;color:#2e7d32}
  .upload-status.fail{background:#fdecea;color:#c0392b}
  .upload-status.pending{background:#fff4dc;color:#a06d3c}
  .replay-btn{width:100%;padding:13px;background:#fff;border:2px solid #d9b88a;color:#7d5a3c;font-size:15px;font-weight:700;border-radius:12px;margin-top:10px}
</style>
</head>
<body>

<div id="net-badge" class="net-badge online">● 온라인</div>

<div id="loading" class="screen">
  <div class="spinner"></div>
  <div style="color:#7d5a3c;font-weight:600">불러오는 중...</div>
</div>

<div id="intro" class="screen hidden">
  <div class="card">
    <div class="title">🌰 호두 달리기</div>
    <div class="subtitle">만족도 조사 게임</div>
    <div id="program-info" class="program-info"></div>
    <div class="field">
      <label for="nickname">닉네임</label>
      <input id="nickname" type="text" maxlength="12" placeholder="이름 또는 별명">
    </div>
    <div class="field">
      <label for="phone">전화번호 뒷 4자리</label>
      <input id="phone" type="tel" inputmode="numeric" maxlength="4" placeholder="0000">
    </div>
    <div id="form-err" class="err"></div>
    <button id="start-btn" class="start-btn">시작하기</button>
    <div class="help">
      🌰 화면을 탭하면 호두가 점프합니다.<br>
      벽에 다가올 때 점프 횟수만큼 위로 올라가요.<br>
      원하는 만족도 칸으로 통과하세요!
    </div>
  </div>
</div>

<div id="game" class="screen hidden">
  <div id="q-box">
    <div id="q-counter"></div>
    <div id="q-text"></div>
  </div>
  <canvas id="canvas"></canvas>
  <div id="tap-hint">탭해서 점프!</div>
  <div id="hud">
    <span>⏱ <span id="timer">0.0</span>s</span>
    <span>🚧 패널티 <span id="penalty">0.0</span>s</span>
  </div>
</div>

<div id="result" class="screen hidden">
  <div class="card">
    <div class="title">🎉 완주!</div>
    <div class="subtitle" id="result-name"></div>
    <div class="result-stat"><span>완주 시간</span><strong id="r-time">0.0초</strong></div>
    <div class="result-stat"><span>패널티</span><strong id="r-penalty">0.0초</strong></div>
    <div class="result-stat"><span>응답 수</span><strong id="r-count">0개</strong></div>
    <div id="upload-status" class="upload-status pending">업로드 중...</div>
    <button id="replay-btn" class="replay-btn">새 응답 시작</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import { getFirestore, doc, getDoc, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBPI8wugVUAOcehqDkYHa-xXFX5vSKgWs4",
  authDomain: "hodoo-survey.firebaseapp.com",
  projectId: "hodoo-survey",
  storageBucket: "hodoo-survey.firebasestorage.app",
  messagingSenderId: "917750738044",
  appId: "1:917750738044:web:b3023dee781b31640d2df9"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const $ = id => document.getElementById(id);
const params = new URLSearchParams(location.search);
const programId = params.get("p");

const SLOT_LABELS = ["매우만족","만족","보통","불만족","매우불만족"];
const SLOT_COLORS = ["#2e7d32","#7cb342","#fbc02d","#fb8c00","#e53935"];
const QUEUE_KEY = "hodoo_queue";
const PROG_CACHE_KEY = pid => "hodoo_prog_" + pid;

let program = null;

// ===== 네트워크 표시 =====
function updateNet(){
  const b = $("net-badge");
  if (navigator.onLine){ b.className = "net-badge online"; b.textContent = "● 온라인"; }
  else { b.className = "net-badge offline"; b.textContent = "● 오프라인"; }
}
window.addEventListener("online", () => { updateNet(); flushQueue(); });
window.addEventListener("offline", updateNet);
updateNet();

// ===== 큐 (오프라인 응답 자동 업로드) =====
async function flushQueue(){
  const q = JSON.parse(localStorage.getItem(QUEUE_KEY) || "[]");
  if (!q.length) return;
  const remain = [];
  for (const item of q){
    try { await addDoc(collection(db,"responses"), {...item, ts: serverTimestamp(), uploadedFromQueue:true}); }
    catch(e){ remain.push(item); }
  }
  localStorage.setItem(QUEUE_KEY, JSON.stringify(remain));
}
flushQueue();

// ===== 프로그램 로드 =====
async function loadProgram(){
  if (!programId){
    showError("프로그램 ID가 없습니다.\nQR을 다시 스캔해주세요.");
    return;
  }
  try {
    const snap = await getDoc(doc(db,"programs",programId));
    if (!snap.exists()){ showError("프로그램을 찾을 수 없습니다."); return; }
    program = { id: snap.id, ...snap.data() };
    localStorage.setItem(PROG_CACHE_KEY(programId), JSON.stringify(program));
  } catch(e){
    const cached = localStorage.getItem(PROG_CACHE_KEY(programId));
    if (cached){ program = JSON.parse(cached); }
    else { showError("프로그램 로드 실패.\n인터넷 연결을 확인하세요."); return; }
  }
  if (!program.questions || !program.questions.length){
    showError("등록된 질문이 없습니다."); return;
  }
  showIntro();
}

function showError(msg){
  $("loading").innerHTML = '<div style="color:#c0392b;font-weight:700;text-align:center;line-height:1.6;white-space:pre-line">'+msg+'</div>';
}
function showIntro(){
  $("loading").classList.add("hidden");
  $("intro").classList.remove("hidden");
  $("program-info").innerHTML = '<strong>'+escapeHtml(program.name||"")+'</strong>'
    + (program.date ? '<span>'+escapeHtml(program.date)+'</span>' : '')
    + (program.surveyName ? '<div style="margin-top:4px;font-size:12px">'+escapeHtml(program.surveyName)+'</div>' : '');
  const saved = JSON.parse(sessionStorage.getItem("hodoo_user")||"{}");
  if (saved.name) $("nickname").value = saved.name;
}

function escapeHtml(s){return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

// ===== 시작 버튼 =====
$("start-btn").addEventListener("click", () => {
  const name = $("nickname").value.trim();
  const phone = $("phone").value.trim();
  if (!name){ $("form-err").textContent = "닉네임을 입력해주세요."; return; }
  if (!/^\d{4}$/.test(phone)){ $("form-err").textContent = "전화번호 뒷 4자리를 입력해주세요."; return; }
  $("form-err").textContent = "";
  sessionStorage.setItem("hodoo_user", JSON.stringify({name,phone}));
  startGame(name, phone);
});

// ===== 게임 =====
const cv = $("canvas");
const cx = cv.getContext("2d");
let W=0, H=0, DPR=1;
function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  W = cv.clientWidth = window.innerWidth;
  H = cv.clientHeight = window.innerHeight;
  cv.width = W*DPR; cv.height = H*DPR;
  cx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener("resize", resize);

const SLOTS = 5;
const HOLE_H = 56;
const WALL_W = 38;
const TOP_MARGIN = 110;   // q-box 아래
const BOTTOM_MARGIN = 70; // hud 위 (지면)
function slotY(slot){
  const ground = H - BOTTOM_MARGIN - HOLE_H/2;
  const top = TOP_MARGIN + HOLE_H/2;
  return ground - ((slot-1)/(SLOTS-1)) * (ground - top);
}

let game = null;

function startGame(name, phone){
  $("intro").classList.add("hidden");
  $("game").classList.remove("hidden");
  resize();
  game = {
    name, phone,
    questions: program.questions,
    qIdx: 0,
    answers: [],
    startTs: performance.now(),
    penaltyMs: 0,
    finished: false,
    runX: 0,            // 배경 스크롤
    walls: [],
    player: { x: Math.max(80, W*0.18), y: slotY(1), targetSlot: 1, anim: 1 },
    nextWallTimer: 0,
    showHint: true
  };
  spawnNextWall(900);
  $("q-text").textContent = game.questions[0].text || game.questions[0];
  $("q-counter").textContent = "Q1 / "+game.questions.length;
  $("tap-hint").classList.remove("hidden");
  setTimeout(()=>{ if(game) game.showHint=false; $("tap-hint").classList.add("hidden"); }, 2200);
  requestAnimationFrame(loop);
}

function spawnNextWall(distance){
  game.walls.push({
    x: W + distance,
    passed: false,
    qIdx: game.qIdx + (game.walls.length)
  });
}

function jump(){
  if (!game || game.finished) return;
  game.showHint = false;
  $("tap-hint").classList.add("hidden");
  if (game.player.targetSlot < SLOTS){
    game.player.targetSlot++;
    game.player.anim = 0; // 점프중 표시
  }
}
cv.addEventListener("touchstart", e => { e.preventDefault(); jump(); }, {passive:false});
cv.addEventListener("mousedown", jump);
window.addEventListener("keydown", e => { if (e.code==="Space"){ e.preventDefault(); jump(); }});

let lastT = 0;
function loop(t){
  if (!game) return;
  const dt = Math.min(50, t - lastT) || 16;
  lastT = t;

  cx.clearRect(0,0,W,H);
  drawBackground(dt);

  const SPEED = 0.22; // px per ms
  const moveX = SPEED * dt;
  game.runX += moveX;

  // 플레이어 y 부드럽게 이동
  const targetY = slotY(game.player.targetSlot);
  const dy = targetY - game.player.y;
  game.player.y += dy * 0.18;
  if (Math.abs(dy) < 1){ game.player.anim = 1; }

  // 벽 업데이트
  for (const w of game.walls){
    w.x -= moveX;
    drawWall(w);
    if (!w.passed && w.x <= game.player.x){
      w.passed = true;
      const slot = game.player.targetSlot;
      const slotPosY = slotY(slot);
      const offsetFromCenter = Math.abs(game.player.y - slotPosY);
      let pen = 0;
      if (offsetFromCenter > HOLE_H*0.35){ pen = 1500; }
      else if (offsetFromCenter > HOLE_H*0.20){ pen = 700; }
      game.penaltyMs += pen;
      game.answers.push({ q: game.questions[w.qIdx].text || game.questions[w.qIdx], a: slot, label: SLOT_LABELS[slot-1] });
      flashHole(slot, pen>0);
      // 다음 질문
      game.qIdx++;
      if (game.qIdx < game.questions.length){
        $("q-text").textContent = game.questions[game.qIdx].text || game.questions[game.qIdx];
        $("q-counter").textContent = "Q"+(game.qIdx+1)+" / "+game.questions.length;
        spawnNextWall(700);
        // 다음 벽 위해 슬롯 리셋 (착지)
        game.player.targetSlot = 1;
      } else {
        finishGame();
      }
    }
  }
  // 지나간 벽 정리
  game.walls = game.walls.filter(w => w.x > -100);

  drawPlayer();

  // HUD
  const elapsed = (performance.now() - game.startTs)/1000;
  $("timer").textContent = elapsed.toFixed(1);
  $("penalty").textContent = (game.penaltyMs/1000).toFixed(1);

  if (!game.finished) requestAnimationFrame(loop);
}

// ===== 그리기 =====
function drawBackground(dt){
  // 하늘 그라디언트는 CSS, 여기선 지면과 구름
  // 구름
  cx.fillStyle = "rgba(255,255,255,.7)";
  for (let i=0;i<3;i++){
    const cx1 = ((i*220 - game.runX*0.15) % (W+220) + (W+220)) % (W+220) - 110;
    const cy = 60 + i*22;
    cloud(cx1, cy);
  }
  // 지면
  const ground = H - BOTTOM_MARGIN + 6;
  cx.fillStyle = "#caa06a";
  cx.fillRect(0, ground, W, H - ground);
  // 줄무늬 지면 (스크롤)
  cx.fillStyle = "#a8814f";
  for (let x=-((game.runX)%40); x<W; x+=40){
    cx.fillRect(x, ground+8, 24, 4);
  }
  // 잔디
  cx.fillStyle = "#86b25c";
  cx.fillRect(0, ground-4, W, 4);
}
function cloud(x,y){
  cx.beginPath();
  cx.arc(x, y, 18, 0, Math.PI*2);
  cx.arc(x+18, y-4, 16, 0, Math.PI*2);
  cx.arc(x+34, y, 14, 0, Math.PI*2);
  cx.fill();
}

function drawWall(w){
  const wallX = w.x;
  const ground = H - BOTTOM_MARGIN;
  const top = TOP_MARGIN;

  // 구멍 영역
  const holes = [];
  for (let s=1;s<=SLOTS;s++){
    const sy = slotY(s);
    holes.push({y1: sy - HOLE_H/2, y2: sy + HOLE_H/2, slot: s});
  }
  holes.sort((a,b)=>a.y1-b.y1); // 위→아래

  // 벽 (위→아래 빈틈 사이 채우기)
  cx.fillStyle = "#6b4a8a";
  cx.fillRect(wallX, top, WALL_W, holes[0].y1 - top);
  for (let i=0;i<holes.length-1;i++){
    cx.fillRect(wallX, holes[i].y2, WALL_W, holes[i+1].y1 - holes[i].y2);
  }
  cx.fillRect(wallX, holes[holes.length-1].y2, WALL_W, ground - holes[holes.length-1].y2);

  // 벽 모서리 하이라이트
  cx.fillStyle = "rgba(255,255,255,.18)";
  cx.fillRect(wallX, top, 4, ground - top);
  cx.fillStyle = "rgba(0,0,0,.18)";
  cx.fillRect(wallX+WALL_W-4, top, 4, ground - top);

  // 구멍 테두리
  for (let s=1;s<=SLOTS;s++){
    const sy = slotY(s);
    cx.strokeStyle = SLOT_COLORS[s-1];
    cx.lineWidth = 3;
    cx.strokeRect(wallX-1, sy - HOLE_H/2, WALL_W+2, HOLE_H);
  }

  // 라벨
  if (wallX < W && wallX > -120){
    cx.font = "700 13px -apple-system,sans-serif";
    cx.textAlign = "left";
    cx.textBaseline = "middle";
    for (let s=1;s<=SLOTS;s++){
      const sy = slotY(s);
      // 라벨 배경
      const text = (s)+". "+SLOT_LABELS[s-1];
      const w1 = cx.measureText(text).width + 10;
      cx.fillStyle = "rgba(255,255,255,.85)";
      cx.fillRect(wallX + WALL_W + 4, sy - 11, w1, 22);
      cx.fillStyle = SLOT_COLORS[s-1];
      cx.fillRect(wallX + WALL_W + 4, sy - 11, 4, 22);
      cx.fillStyle = "#3a2814";
      cx.fillText(text, wallX + WALL_W + 12, sy);
    }
  }
}

let flashState = null;
function flashHole(slot, isMiss){
  flashState = { slot, t: 0, miss: isMiss };
}

function drawPlayer(){
  const p = game.player;
  const x = p.x, y = p.y;
  const bob = Math.sin(performance.now()/100) * 1.5;

  // 그림자
  cx.fillStyle = "rgba(0,0,0,.18)";
  cx.beginPath();
  cx.ellipse(x, H - BOTTOM_MARGIN + 4, 22, 5, 0, 0, Math.PI*2);
  cx.fill();

  cx.save();
  cx.translate(x, y + bob);

  // 호두 몸체
  cx.fillStyle = "#a06a3a";
  cx.beginPath();
  cx.ellipse(0, 0, 24, 28, 0, 0, Math.PI*2);
  cx.fill();

  // 호두 무늬 (세로 갈라짐)
  cx.strokeStyle = "#6b4220";
  cx.lineWidth = 2;
  cx.beginPath();
  cx.moveTo(0, -24); cx.lineTo(0, 24);
  cx.stroke();

  // 호두 텍스처 (좌우 곡선)
  cx.lineWidth = 1.4;
  cx.beginPath();
  cx.moveTo(-12,-14); cx.quadraticCurveTo(-6,-4,-12,8);
  cx.moveTo(12,-14); cx.quadraticCurveTo(6,-4,12,8);
  cx.stroke();

  // 작은 잎 (꼭지)
  cx.fillStyle = "#5fa84d";
  cx.beginPath();
  cx.ellipse(-2, -28, 6, 3, -0.5, 0, Math.PI*2);
  cx.fill();
  cx.fillStyle = "#3d7a30";
  cx.beginPath();
  cx.ellipse(3, -29, 4, 2, 0.4, 0, Math.PI*2);
  cx.fill();

  // 얼굴 영역 (밝은 베이지)
  cx.fillStyle = "#ffe5c4";
  cx.beginPath();
  cx.ellipse(0, 4, 13, 11, 0, 0, Math.PI*2);
  cx.fill();

  // 볼터치
  cx.fillStyle = "rgba(244,135,135,.65)";
  cx.beginPath(); cx.arc(-7, 7, 2.5, 0, Math.PI*2); cx.fill();
  cx.beginPath(); cx.arc(7, 7, 2.5, 0, Math.PI*2); cx.fill();

  // 눈
  cx.fillStyle = "#222";
  cx.beginPath(); cx.arc(-4, 1, 1.8, 0, Math.PI*2); cx.fill();
  cx.beginPath(); cx.arc(4, 1, 1.8, 0, Math.PI*2); cx.fill();
  cx.fillStyle = "#fff";
  cx.beginPath(); cx.arc(-3.5, .5, .6, 0, Math.PI*2); cx.fill();
  cx.beginPath(); cx.arc(4.5, .5, .6, 0, Math.PI*2); cx.fill();

  // 입
  cx.strokeStyle = "#222";
  cx.lineWidth = 1.5;
  cx.lineCap = "round";
  cx.beginPath();
  cx.arc(0, 6, 3, 0.2*Math.PI, 0.8*Math.PI);
  cx.stroke();

  // 다리 (달리기 애니)
  const legPhase = Math.floor(performance.now()/100) % 2;
  cx.fillStyle = "#6b4220";
  if (legPhase===0){
    cx.fillRect(-9, 24, 6, 10);
    cx.fillRect(5, 22, 6, 12);
  } else {
    cx.fillRect(-9, 22, 6, 12);
    cx.fillRect(5, 24, 6, 10);
  }

  cx.restore();

  // 플래시
  if (flashState){
    flashState.t += 1;
    const sy = slotY(flashState.slot);
    cx.save();
    cx.globalAlpha = Math.max(0, 1 - flashState.t/30);
    cx.fillStyle = flashState.miss ? "rgba(229,57,53,.4)" : "rgba(46,125,50,.4)";
    cx.fillRect(0, sy - HOLE_H/2, W, HOLE_H);
    cx.restore();
    if (flashState.t > 30) flashState = null;
  }
}

// ===== 종료 / 업로드 =====
function finishGame(){
  game.finished = true;
  const elapsed = (performance.now() - game.startTs)/1000;
  $("game").classList.add("hidden");
  $("result").classList.remove("hidden");
  $("result-name").textContent = game.name + " 님";
  $("r-time").textContent = elapsed.toFixed(1) + "초";
  $("r-penalty").textContent = (game.penaltyMs/1000).toFixed(1) + "초";
  $("r-count").textContent = game.answers.length + "개";

  const payload = {
    programId: program.id,
    programName: program.name || "",
    surveyName: program.surveyName || "",
    date: program.date || "",
    name: game.name,
    phone: game.phone,
    timeSec: +elapsed.toFixed(2),
    penaltySec: +(game.penaltyMs/1000).toFixed(2),
    answers: game.answers,
    clientTs: Date.now()
  };

  uploadResponse(payload);
}

async function uploadResponse(data){
  const status = $("upload-status");
  status.className = "upload-status pending";
  status.textContent = "업로드 중...";
  try {
    if (!navigator.onLine) throw new Error("offline");
    await addDoc(collection(db,"responses"), { ...data, ts: serverTimestamp() });
    status.className = "upload-status ok";
    status.textContent = "✅ 응답이 저장되었습니다";
  } catch(e){
    const q = JSON.parse(localStorage.getItem(QUEUE_KEY) || "[]");
    q.push(data);
    localStorage.setItem(QUEUE_KEY, JSON.stringify(q));
    status.className = "upload-status fail";
    status.textContent = "📦 오프라인 - 임시 저장됨 (재접속 시 자동 업로드)";
  }
}

$("replay-btn").addEventListener("click", () => {
  $("result").classList.add("hidden");
  $("nickname").value = "";
  $("phone").value = "";
  $("intro").classList.remove("hidden");
});

// 시작
loadProgram();
